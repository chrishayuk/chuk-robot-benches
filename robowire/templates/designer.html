<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>robowire designer</title>
<style>
  :root {
    --bg: #0d1114; --panel: #161c20; --panel2: #1d2429; --line: #2a3339;
    --ink: #e6e9e4; --dim: #8b969b; --accent: #e8a33d; --ok: #57b48f; --bad: #e05c50;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink); overflow: hidden;
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    display: grid; grid-template-columns: 240px 1fr 340px; grid-template-rows: 48px 1fr;
    grid-template-areas: "head head head" "left canvas right";
  }
  header {
    grid-area: head; display: flex; align-items: center; gap: 12px; padding: 0 14px;
    border-bottom: 1px solid var(--line); background: var(--panel);
  }
  header h1 {
    margin: 0; font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase;
    font-family: "Avenir Next Condensed", "Arial Narrow", sans-serif;
  }
  header input#nlname {
    background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
    border-radius: 4px; padding: 4px 8px; font-family: ui-monospace, Menlo, monospace; font-size: 12px;
    width: 220px;
  }
  header .spacer { flex: 1; }
  button {
    background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
    border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 12px;
    font-family: ui-monospace, Menlo, monospace;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #14100a; font-weight: 700; border-color: var(--accent); }
  button.mini { padding: 1px 7px; font-size: 10px; }
  #left { grid-area: left; border-right: 1px solid var(--line); overflow-y: auto; padding: 10px; background: var(--panel); }
  #right { grid-area: right; border-left: 1px solid var(--line); overflow-y: auto; padding: 10px; background: var(--panel); }
  #board { grid-area: canvas; display: block; width: 100%; height: 100%; cursor: default; }
  h2 {
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim);
    font-family: "Avenir Next Condensed", "Arial Narrow", sans-serif; margin: 12px 0 6px;
  }
  .part {
    display: flex; justify-content: space-between; align-items: center; gap: 6px;
    padding: 5px 7px; border: 1px solid var(--line); border-radius: 4px; margin-bottom: 5px;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
  }
  .part .k { color: var(--dim); font-size: 9px; }
  .row {
    border: 1px solid var(--line); border-radius: 4px; padding: 6px 8px; margin-bottom: 6px;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
  }
  .row.sel { border-color: var(--accent); }
  .row .hd { display: flex; gap: 6px; align-items: center; }
  .row input, .row select {
    background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
    border-radius: 3px; padding: 2px 5px; font-family: inherit; font-size: 11px;
  }
  .row input.id { width: 88px; }
  .row input.volts { width: 48px; }
  .row .pins { color: var(--dim); margin-top: 4px; overflow-wrap: anywhere; }
  .check { display: flex; gap: 7px; align-items: baseline; padding: 3px 0; font-family: ui-monospace, Menlo, monospace; font-size: 11px; }
  .check .pill { font-weight: 700; padding: 0 6px; border-radius: 3px; font-size: 10px; color: #0d1114; flex-shrink: 0; }
  .check .d { color: var(--dim); }
  #selinfo {
    border: 1px solid var(--accent); border-radius: 6px; padding: 8px 10px; margin: 10px 0 4px;
  }
  #selinfo .about { font-size: 12.5px; line-height: 1.5; text-wrap: pretty; margin: 4px 0; }
  #selinfo .meta { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: var(--dim); overflow-wrap: anywhere; }
  #selinfo .chip { display: inline-block; font-size: 10px; letter-spacing: 0.1em; padding: 0 7px; border-radius: 3px; font-weight: 700; color: #0d1114; }
  #selinfo ul { margin: 5px 0 0; padding-left: 0; list-style: none; font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; }
  #selinfo li { margin-top: 3px; overflow-wrap: anywhere; }
  #verdict { font-family: ui-monospace, Menlo, monospace; font-weight: 700; padding: 6px 8px; border-radius: 4px; margin-bottom: 6px; }
  #verdict.ok { background: color-mix(in srgb, var(--ok) 22%, transparent); color: var(--ok); }
  #verdict.bad { background: color-mix(in srgb, var(--bad) 22%, transparent); color: var(--bad); }
  #hint { position: fixed; bottom: 10px; left: 254px; color: var(--dim); font-size: 11px;
    background: color-mix(in srgb, var(--panel) 85%, transparent); padding: 4px 10px; border-radius: 4px; }
  dialog {
    background: var(--panel); color: var(--ink); border: 1px solid var(--line); border-radius: 8px;
    max-width: 640px; width: 80vw;
  }
  dialog::backdrop { background: rgba(0,0,0,0.6); }
  dialog textarea { width: 100%; height: 300px; background: var(--panel2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px; font: 11px ui-monospace, Menlo, monospace; }
  textarea#fsloss { width: 100%; height: 54px; background: var(--panel2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px; font: 11px ui-monospace, Menlo, monospace; }
  label.ck { display: flex; gap: 6px; align-items: center; font-size: 11px; font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
<header>
  <h1>robowire <span style="color:var(--accent)">designer</span></h1>
  <input id="nlname" title="netlist name">
  <span class="spacer"></span>
  <button id="modeBtn">3D view</button>
  <button id="arrangeBtn">auto-arrange</button>
  <button id="importBtn">import</button>
  <button id="exportBtn" class="primary">export netlist</button>
</header>
<div id="left">
  <h2>layers</h2>
  <div id="layerToggles"></div>
  <h2>examples — click to load</h2>
  <div id="examples"></div>
  <h2>parts catalogue — drag onto the board</h2>
  <input id="partFilter" placeholder="filter parts…" style="width:100%;margin-bottom:6px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:4px;padding:4px 8px;font:11px ui-monospace,Menlo,monospace">
  <div id="palette"></div>
</div>
<canvas id="board"></canvas>
<div id="right">
  <div id="verdict"></div>
  <div id="checks"></div>
  <div id="selinfo" style="display:none"></div>
  <h2>nets — click a pin, then another, to wire</h2>
  <div id="nets"></div>
  <h2>i2c buses</h2>
  <div id="buses"></div>
  <button id="addBus" class="mini">+ add bus</button>
  <h2>failsafe declaration (E41)</h2>
  <textarea id="fsloss" placeholder="what happens on radio loss…"></textarea>
  <div id="fspins" style="margin-top:4px"></div>
</div>
<div id="hint"></div>
<dialog id="ioDialog">
  <h2 id="ioTitle">netlist json</h2>
  <textarea id="ioText"></textarea>
  <div style="display:flex; gap:8px; margin-top:8px">
    <button id="ioApply" class="primary">apply</button>
    <button id="ioDownload">download file</button>
    <button id="ioClose">close</button>
  </div>
</dialog>
<script>
const PARTS =
//__PARTS__
[];
const START_NETLIST =
//__NETLIST__
null;
const EXAMPLES =
//__EXAMPLES__
[];
const WASM_B64 =
//__WASM__
"";

(async function () {
  "use strict";

  // ---- the real checker, in-browser --------------------------------------
  const bytes = Uint8Array.from(atob(WASM_B64), c => c.charCodeAt(0));
  const { instance } = await WebAssembly.instantiate(bytes, {});
  const W = instance.exports;
  const enc = new TextEncoder(), dec = new TextDecoder();
  function callChecks(netlistObj) {
    const nl = enc.encode(JSON.stringify(netlistObj));
    const ps = enc.encode(JSON.stringify(PARTS));
    const p1 = W.wasm_alloc(nl.length), p2 = W.wasm_alloc(ps.length);
    new Uint8Array(W.memory.buffer, p1, nl.length).set(nl);
    new Uint8Array(W.memory.buffer, p2, ps.length).set(ps);
    W.run_checks_json(p1, nl.length, p2, ps.length);
    W.wasm_free(p1, nl.length); W.wasm_free(p2, ps.length);
    const out = new Uint8Array(W.memory.buffer, W.out_ptr(), W.out_len());
    return JSON.parse(dec.decode(out));
  }

  // ---- model ---------------------------------------------------------------
  const partById = {};
  for (const p of PARTS) partById[p.id] = p;
  let nl = START_NETLIST || { name: "new-harness", instances: {}, nets: [], buses: [], failsafe: { rx_loss: "", stop_pins: [] } };
  if (!nl.failsafe) nl.failsafe = { rx_loss: "", stop_pins: [] };
  if (!nl.buses) nl.buses = [];
  const LAYOUT_KEY = () => "robowire-layout:" + nl.name;
  let layout = {};
  try { layout = JSON.parse(localStorage.getItem(LAYOUT_KEY()) || "{}"); } catch {}
  function saveLayout() { try { localStorage.setItem(LAYOUT_KEY(), JSON.stringify(layout)); } catch {} }

  const COLORS = {
    vbat: "#e05c50", v5: "#e8a33d", v33: "#c3c94f", gnd: "#7d8b93",
    motor: "#e0784f", pwm: "#4f9dd6", uart: "#a97fd6", i2c: "#57b48f", sig: "#9aa4ab",
  };
  const decl = ep => {
    const [inst, pin] = splitPin(ep);
    return partById[nl.instances[inst]]?.elec?.pins?.[pin] || null;
  };
  const splitPin = ep => { const i = ep.indexOf("."); return [ep.slice(0, i), ep.slice(i + 1)]; };
  function netClass(net) {
    const isGnd = net.volts == null && net.signal == null &&
      net.pins.some(p => p.endsWith(".GND") || p.endsWith(".-"));
    if (isGnd) return "gnd";
    if (net.pins.some(p => { const d = decl(p); return d && (d.role === "motor_in" || d.role === "motor_out"); })) return "motor";
    if (net.volts != null) return net.volts > 6 ? "vbat" : net.volts > 4 ? "v5" : "v33";
    if (net.signal === "pwm") return "pwm";
    if (net.signal === "uart") return "uart";
    return "sig";
  }

  // ---- canvas layout -------------------------------------------------------
  const cv = document.getElementById("board");
  const cx = cv.getContext("2d");
  let dpr = 1;
  function resize() {
    dpr = window.devicePixelRatio || 1;
    cv.width = cv.clientWidth * dpr; cv.height = cv.clientHeight * dpr;
    draw();
  }
  const BOXW = 128;
  function pinsOf(inst) {
    const part = partById[nl.instances[inst]];
    return Object.keys(part?.elec?.pins || {});
  }
  function boxGeo(inst) {
    const pins = pinsOf(inst);
    const rows = Math.ceil(pins.length / 2);
    const bh = 34 + Math.max(rows, 1) * 15; // upright height
    if (!layout[inst]) layout[inst] = [80 + Object.keys(layout).length * 40, 80 + Object.keys(layout).length * 30, 0];
    const L = layout[inst];
    const [x, y] = L;
    const rot = ((L[2] || 0) % 360 + 360) % 360;
    const rad = rot * Math.PI / 180;
    const cr = Math.cos(rad), sr = Math.sin(rad);
    const pinPos = {};
    pins.forEach((p, i) => {
      const side = i % 2 === 0 ? -1 : 1;
      const row = Math.floor(i / 2);
      const rx = side * BOXW / 2, ry = -bh / 2 + 40 + row * 15;
      const ox = side * cr, oy = side * sr;
      pinPos[p] = [x + rx * cr - ry * sr, y + rx * sr + ry * cr, ox, oy];
    });
    const w = rot % 180 === 0 ? BOXW : bh;
    const h = rot % 180 === 0 ? bh : BOXW;
    return { x, y, w, h, rot, pinPos };
  }
  function pinXY(ep) {
    const [inst, pin] = splitPin(ep);
    if (!(inst in nl.instances)) return null;
    if (!instVisible(inst)) return null;
    const g = boxGeo(inst);
    return g.pinPos[pin] || null;
  }

  let mode = "2d";
  let wireDrag = null;      // {from, cur:[x,y], moved} while dragging a wire
  let yaw = -0.7, pitch = 0.5, dist = 900;
  let orbiting = false;
  const KIND_H = { battery: 30, esc: 16, mcu: 12, motor: 26, switch: 14, tof: 10, imu: 10, radio: 10, wiring: 8 };
  function planeCenter() {
    const insts = Object.keys(nl.instances).filter(instVisible);
    if (!insts.length) return [0, 0];
    let sx = 0, sy = 0;
    for (const i of insts) { const g = boxGeo(i); sx += g.x; sy += g.y; }
    return [sx / insts.length, sy / insts.length];
  }
  let pc = [0, 0];
  function project3(pt) {
    // world: x right, y "south" on the floor plane (from 2D layout), z up.
    const dx = pt[0] - pc[0], dy = pt[1] - pc[1], dz = pt[2] - 0;
    const cy = Math.cos(yaw), sy = Math.sin(yaw);
    const x1 = dx * cy - dy * sy, y1 = dx * sy + dy * cy;
    const cp = Math.cos(pitch), sp = Math.sin(pitch);
    const y2 = y1 * cp - dz * sp;
    const z2 = y1 * sp + dz * cp;
    const depth = dist + y2;
    if (depth < 40) return null;
    const f = 900 / depth;
    return [cv.clientWidth / 2 + x1 * f, cv.clientHeight / 2 - z2 * f + 80];
  }
  function geo3(inst) {
    const g = boxGeo(inst);
    const kind = kindOf(inst);
    const h = KIND_H[kind] || 12;
    const W = 74, D = 52;
    const pins = pinsOf(inst);
    const pinPos3 = {};
    pins.forEach((pin, i) => {
      const side = i % 2 === 0 ? -1 : 1;
      const row = Math.floor(i / 2);
      const rows = Math.ceil(pins.length / 2);
      const t = rows > 1 ? row / (rows - 1) : 0.5;
      pinPos3[pin] = [g.x + side * W / 2, g.y - D / 2 + t * D, h];
    });
    return { x: g.x, y: g.y, W, D, h, pinPos3 };
  }
  function pin3(ep) {
    const [inst, pin] = splitPin(ep);
    if (!(inst in nl.instances) || !instVisible(inst)) return null;
    return geo3(inst).pinPos3[pin] || null;
  }
  function arc3(a, b, lift) {
    const mid = [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2, Math.max(a[2], b[2]) + lift];
    const pts = [];
    for (let i = 0; i <= 12; i++) {
      const t = i / 12, u = 1 - t;
      pts.push([
        u * u * a[0] + 2 * u * t * mid[0] + t * t * b[0],
        u * u * a[1] + 2 * u * t * mid[1] + t * t * b[1],
        u * u * a[2] + 2 * u * t * mid[2] + t * t * b[2],
      ]);
    }
    return pts;
  }
  const CLASS_LIFT = { gnd: 12, vbat: 24, v5: 36, v33: 48, motor: 30, pwm: 62, uart: 72, sig: 66, i2c: 84 };
  function netArcs3(net, i) {
    const ends = net.pins.map(pin3).filter(Boolean);
    const lift = (CLASS_LIFT[netClass(net)] || 40) + (i % 3) * 4;
    if (ends.length === 2) return [arc3(ends[0], ends[1], lift)];
    if (ends.length > 2) {
      const n = ends.length;
      const hub = [
        ends.reduce((s, p) => s + p[0], 0) / n,
        ends.reduce((s, p) => s + p[1], 0) / n,
        ends.reduce((s, p) => s + p[2], 0) / n + lift,
      ];
      return ends.map(e => arc3(e, hub, 8));
    }
    return [];
  }

  let pending = null;       // first pin clicked in wire mode
  let pickHandler = null;   // active pin-pick flow (bus/failsafe forms)
  let selNet = -1;
  let selInst = null;
  let dragInst = null, dragOff = [0, 0], dragMoved = false;
  const LAYER_LABELS = {
    vbat: "battery power", v5: "5V supply", v33: "3.3V supply", gnd: "ground",
    motor: "motor power", pwm: "drive commands", uart: "radio link", i2c: "sensor bus", sig: "other signals",
  };
  const layerOn = {};
  for (const k of Object.keys(LAYER_LABELS)) layerOn[k] = true;
  const KIND_LABELS = {
    battery: "battery", switch: "switch", esc: "motor controller", mcu: "brain (MCU)",
    motor: "motors", tof: "floor sensors", imu: "motion sensor", radio: "radio", wiring: "loom allowance",
  };
  const kindOn = {};
  for (const k of Object.keys(KIND_LABELS)) kindOn[k] = true;
  let isolate = false;
  function kindOf(inst) { return partById[nl.instances[inst]]?.kind || "other"; }
  function connectedTo(a) {
    const set = new Set([a]);
    const prefix = a + ".";
    for (const net of nl.nets) {
      if (net.pins.some(p => p.startsWith(prefix))) {
        for (const p of net.pins) set.add(splitPin(p)[0]);
      }
    }
    for (const bus of nl.buses) {
      const onBus = bus.devices.some(d => d.inst === a) ||
        bus.sda.startsWith(prefix) || bus.scl.startsWith(prefix) ||
        bus.devices.some(d => d.xshut && d.xshut.startsWith(prefix));
      if (onBus) {
        set.add(splitPin(bus.sda)[0]);
        for (const d of bus.devices) {
          set.add(d.inst);
          if (d.xshut) set.add(splitPin(d.xshut)[0]);
        }
      }
    }
    return set;
  }
  function focusSet() {
    if (!isolate) return null;
    if (selInst) return connectedTo(selInst);
    if (selNet >= 0 && nl.nets[selNet]) {
      const set = new Set();
      for (const p of nl.nets[selNet].pins) set.add(splitPin(p)[0]);
      return set;
    }
    return null;
  }
  let currentFocus = null; // recomputed per draw
  function instVisible(inst) {
    if (kindOn[kindOf(inst)] === false) return false;
    if (currentFocus && !currentFocus.has(inst)) return false;
    return true;
  }
  function renderLayers() {
    const el = document.getElementById("layerToggles");
    el.innerHTML = "";
    const iso = document.createElement("label");
    iso.className = "ck";
    iso.style.marginBottom = "6px";
    const isoInp = document.createElement("input");
    isoInp.type = "checkbox"; isoInp.checked = isolate;
    isoInp.addEventListener("change", () => { isolate = isoInp.checked; draw(); });
    const isoTag = document.createElement("span");
    isoTag.style.cssText = "color:var(--accent);font-weight:700";
    isoTag.textContent = "isolate";
    iso.append(isoInp, isoTag, document.createTextNode(" selection + its wiring"));
    el.appendChild(iso);

    const wiresHd = document.createElement("div");
    wiresHd.style.cssText = "color:var(--dim);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;margin:4px 0 2px";
    wiresHd.textContent = "wires";
    el.appendChild(wiresHd);
    for (const [k, label] of Object.entries(LAYER_LABELS)) {
      const lab = document.createElement("label");
      lab.className = "ck";
      const inp = document.createElement("input");
      inp.type = "checkbox"; inp.checked = layerOn[k];
      inp.addEventListener("change", () => { layerOn[k] = inp.checked; draw(); });
      const sw = document.createElement("span");
      sw.style.cssText = "width:14px;height:3px;border-radius:2px;display:inline-block;background:" + (COLORS[k] || "#999");
      lab.append(inp, sw, document.createTextNode(label));
      el.appendChild(lab);
    }
    const compHd = document.createElement("div");
    compHd.style.cssText = "color:var(--dim);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;margin:8px 0 2px";
    compHd.textContent = "components";
    el.appendChild(compHd);
    const presentKinds = [...new Set(PARTS.filter(p => p.elec && Object.keys(p.elec.pins || {}).length).map(p => p.kind))];
    for (const k of presentKinds) {
      const label = KIND_LABELS[k] || k;
      if (kindOn[k] === undefined) kindOn[k] = true;
      const lab = document.createElement("label");
      lab.className = "ck";
      const inp = document.createElement("input");
      inp.type = "checkbox"; inp.checked = kindOn[k];
      inp.addEventListener("change", () => {
        kindOn[k] = inp.checked;
        if (selInst && !inp.checked && kindOf(selInst) === k) { selInst = null; }
        draw();
      });
      const sw = document.createElement("span");
      sw.style.cssText = "width:14px;height:10px;border:1px solid #77848c;border-radius:2px;display:inline-block";
      lab.append(inp, sw, document.createTextNode(label));
      el.appendChild(lab);
    }
  }

  // Shared wire geometry so drawing and hit-testing can't disagree.
  function netSegments(net) {
    const pts = net.pins.map(pinXY).filter(Boolean);
    if (pts.length < 2) return { segs: [], hub: null };
    if (pts.length === 2) return { segs: [[pts[0], pts[1]]], hub: null };
    const hub = [pts.reduce((s, p) => s + p[0], 0) / pts.length, pts.reduce((s, p) => s + p[1], 0) / pts.length];
    return { segs: pts.map(p => [p, hub]), hub };
  }
  function bezPoint(a, b, t) {
    const mx = (a[0] + b[0]) / 2;
    const u = 1 - t;
    // cubic with P1=(mx, ay), P2=(mx, by) — matches the draw call.
    const x = u*u*u*a[0] + 3*u*u*t*mx + 3*u*t*t*mx + t*t*t*b[0];
    const y = u*u*u*a[1] + 3*u*u*t*a[1] + 3*u*t*t*b[1] + t*t*t*b[1];
    return [x, y];
  }
  function wireAt(mx, my) {
    for (let i = nl.nets.length - 1; i >= 0; i--) {
      const net = nl.nets[i];
      if (!layerOn[netClass(net)]) continue;
      if (mode === "3d") {
        for (const arc of netArcs3(net, i)) {
          let prev = null;
          for (const p of arc) {
            const q = project3(p);
            if (q && prev) {
              if (distSeg(mx, my, prev[0], prev[1], q[0], q[1]) < 6) return i;
            }
            prev = q;
          }
        }
      } else {
        const { segs } = netSegments(net);
        for (const [a, b] of segs) {
          let prev = a;
          for (let k = 1; k <= 12; k++) {
            const q = bezPoint(a, b, k / 12);
            const d = distSeg(mx, my, prev[0], prev[1], q[0], q[1]);
            if (d < 6) return i;
            prev = q;
          }
        }
      }
    }
    return -1;
  }
  function distSeg(px, py, x1, y1, x2, y2) {

  cv.addEventListener("drop", e => {
    const partId = e.dataTransfer.getData("text/robowire-part");
    if (!partId) return;
    e.preventDefault();
    placeInstance(partId, e.offsetX, e.offsetY);
    refresh();
  });
  window.addEventListener("keydown", e => {
    const tag = document.activeElement && document.activeElement.tagName;
    if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
    if (e.key === "Escape") { pending = null; pickHandler = null; wireDrag = null; selInst = null; selNet = -1; renderNets(); renderSelInfo(); draw(); hint(""); }
    if ((e.key === "r" || e.key === "R") && selInst && mode === "2d") {
      const L = layout[selInst];
      L[2] = ((L[2] || 0) + 90) % 360;
      saveLayout();
      draw();
      return;
    }
    if ((e.key === "Delete" || e.key === "Backspace")) {
      if (selNet >= 0) { nl.nets.splice(selNet, 1); selNet = -1; refresh(); }
      else if (selInst) { removeInstance(selInst); refresh(); }
      e.preventDefault();
    }
  });
  function autoNetId(a, b) {
    const base = (splitPin(a)[1] + "_" + splitPin(b)[0]).toLowerCase().replace(/[^a-z0-9]+/g, "_");
    let id = base, k = 2;
    while (nl.nets.some(n => n.id === id)) id = base + "_" + k++;
    return id;
  }

  // ---- panels -----------------------------------------------------------------
  function placeInstance(partId, x, y) {
    const p = partById[partId];
    const short = { battery: "batt", switch: "sw", radio: "rx", mcu: "mcu", esc: "esc", imu: "imu", motor: "m", tof: "tof" };
    const base = short[p.kind] || p.kind;
    let cand = base, k = 2;
    while (cand in nl.instances) cand = base + "_" + k++;
    nl.instances[cand] = partId;
    if (x != null) layout[cand] = [x, y];
    saveLayout();
    selInst = cand; selNet = -1;
    return cand;
  }

  const PART_GROUPS = [
    ["power", ["battery", "switch"]],
    ["drive", ["esc", "motor"]],
    ["brain", ["mcu"]],
    ["sensors", ["tof", "imu"]],
    ["radio", ["radio"]],
    ["indicators & passives", ["led", "buzzer", "resistor", "button"]],
  ];
  function renderPalette() {
    const el = document.getElementById("palette");
    el.innerHTML = "";
    const q = (document.getElementById("partFilter").value || "").toLowerCase();
    const electrical = PARTS.filter(p => p.elec && Object.keys(p.elec.pins || {}).length);
    const grouped = new Set();
    const matches = p => !q || p.id.includes(q) || p.kind.includes(q) || (p.description || "").toLowerCase().includes(q);
    const renderGroup = (label, parts) => {
      if (!parts.length) return;
      const hd = document.createElement("div");
      hd.style.cssText = "color:var(--dim);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;margin:8px 0 3px";
      hd.textContent = label;
      el.appendChild(hd);
      for (const p of parts) renderCard(p);
    };
    for (const [label, kinds] of PART_GROUPS) {
      const parts = electrical.filter(p => kinds.includes(p.kind) && matches(p));
      parts.forEach(p => grouped.add(p.id));
      renderGroup(label, parts);
    }
    renderGroup("other", electrical.filter(p => !grouped.has(p.id) && matches(p)));
    function renderCard(p) {
      const div = document.createElement("div");
      div.className = "part";
      div.innerHTML = `<span>${p.id}<br><span class="k">${p.kind}</span></span>`;
      div.draggable = true;
      div.title = (p.description || "") + " — drag onto the board, or click + place";
      div.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/robowire-part", p.id);
        e.dataTransfer.effectAllowed = "copy";
      });
      const btn = document.createElement("button");
      btn.className = "mini"; btn.textContent = "+ place";
      btn.addEventListener("click", () => { placeInstance(p.id); refresh(); });
      div.appendChild(btn);
      el.appendChild(div);
    }
  }
  document.getElementById("partFilter").addEventListener("input", renderPalette);

  function renderExamples() {
    const el = document.getElementById("examples");
    el.innerHTML = "";
    for (const ex of EXAMPLES) {
      const div = document.createElement("div");
      div.className = "part";
      const lesson = ex.name.startsWith("lesson-");
      div.innerHTML = `<span>${ex.name.replace(/^(example|lesson)-/, "")}` +
        `<br><span class="k">${lesson ? "lesson — deliberately broken, read the checks" : "worked example"}</span></span>`;
      const btn = document.createElement("button");
      btn.className = "mini";
      btn.textContent = "load";
      btn.addEventListener("click", () => {
        if (Object.keys(nl.instances).length && !confirm("Replace the current design with '" + ex.name + "'?")) return;
        nl = JSON.parse(JSON.stringify(ex));
        if (!nl.failsafe) nl.failsafe = { rx_loss: "", stop_pins: [] };
        if (!nl.buses) nl.buses = [];
        layout = {};
        selInst = null; selNet = -1; pending = null;
        refresh();
        autoArrange();
      });
      div.appendChild(btn);
      el.appendChild(div);
    }
  }

  function renderNets() {
    const el = document.getElementById("nets");
    el.innerHTML = "";
    nl.nets.forEach((net, i) => {
      const div = document.createElement("div");
      div.className = "row" + (i === selNet ? " sel" : "");
      const col = COLORS[netClass(net)] || "#999";
      div.innerHTML =
        `<div class="hd"><span style="width:10px;height:10px;border-radius:2px;background:${col};display:inline-block"></span>` +
        `<input class="id" value="${net.id}"> V:<input class="volts" value="${net.volts ?? ""}" placeholder="—">` +
        ` sig:<select><option value="">—</option><option${net.signal === "pwm" ? " selected" : ""}>pwm</option><option${net.signal === "uart" ? " selected" : ""}>uart</option></select>` +
        ` <button class="mini del">✕</button></div>` +
        `<div class="pins">${net.pins.join(" · ")} <button class="mini addpin">+pin</button></div>`;
      div.addEventListener("click", () => { if (selNet !== i) { selNet = i; selInst = null; renderNets(); renderSelInfo(); draw(); } });
      div.querySelector(".id").addEventListener("change", e => { net.id = e.target.value; refresh(); });
      div.querySelector(".volts").addEventListener("change", e => {
        const v = parseFloat(e.target.value);
        if (isNaN(v)) delete net.volts; else net.volts = v;
        refresh();
      });
      div.querySelector("select").addEventListener("change", e => {
        if (e.target.value) net.signal = e.target.value; else delete net.signal;
        refresh();
      });
      div.querySelector(".del").addEventListener("click", e => { e.stopPropagation(); nl.nets.splice(i, 1); selNet = -1; refresh(); });
      div.querySelector(".addpin").addEventListener("click", e => {
        e.stopPropagation();
        hint("pick a pin to add to " + net.id);
        pickHandler = pin => { if (!net.pins.includes(pin)) net.pins.push(pin); };
      });
      el.appendChild(div);
    });
  }

  function pinSelectBtn(current, onpick) {
    const b = document.createElement("button");
    b.className = "mini";
    b.textContent = current || "pick pin";
    b.addEventListener("click", () => {
      hint("pick a pin…");
      pickHandler = pin => { onpick(pin); };
    });
    return b;
  }

  function renderBuses() {
    const el = document.getElementById("buses");
    el.innerHTML = "";
    nl.buses.forEach((bus, bi) => {
      const div = document.createElement("div");
      div.className = "row";
      const hd = document.createElement("div");
      hd.className = "hd";
      hd.innerHTML = `<b>${bus.id}</b> (${bus.kind}) sda:${bus.sda} scl:${bus.scl} `;
      const del = document.createElement("button"); del.className = "mini"; del.textContent = "✕";
      del.addEventListener("click", () => { nl.buses.splice(bi, 1); refresh(); });
      hd.appendChild(del);
      div.appendChild(hd);
      bus.devices.forEach((dev, di) => {
        const d = document.createElement("div");
        d.className = "pins";
        d.innerHTML = `${dev.inst} @${dev.addr}` +
          (dev.reassign_to ? ` → ${dev.reassign_to}` : "") +
          (dev.xshut ? ` (xshut ${dev.xshut})` : "") + " ";
        const rm = document.createElement("button"); rm.className = "mini"; rm.textContent = "✕";
        rm.addEventListener("click", () => { bus.devices.splice(di, 1); refresh(); });
        d.appendChild(rm);
        div.appendChild(d);
      });
      const add = document.createElement("button");
      add.className = "mini"; add.textContent = "+ device";
      add.addEventListener("click", () => {
        const eligible = Object.entries(nl.instances).filter(([, pid]) => partById[pid]?.elec?.bus);
        if (!eligible.length) { alert("no bus-capable instances placed"); return; }
        const inst = prompt("instance (" + eligible.map(e => e[0]).join(", ") + "):", eligible[0][0]);
        if (!inst || !(inst in nl.instances)) return;
        const part = partById[nl.instances[inst]];
        const dev = { inst, addr: part?.elec?.bus?.default_addr || "0x00" };
        const re = prompt("reassign to address (blank = keep " + dev.addr + "):", "");
        if (re) dev.reassign_to = re;
        bus.devices.push(dev);
        if (re || part?.elec?.bus?.requires_xshut) {
          hint("pick the MCU pin driving " + inst + ".XSHUT");
          pickHandler = pin => { dev.xshut = pin; refresh(); };
        }
        refresh();
      });
      div.appendChild(add);
      el.appendChild(div);
    });
    document.getElementById("addBus").onclick = () => {
      const bus = { id: "i2c" + nl.buses.length, kind: "i2c", sda: "", scl: "", devices: [] };
      nl.buses.push(bus);
      hint("pick the SDA pin (an MCU i2c_sda-capable pin)");
      pickHandler = pin => {
        bus.sda = pin;
        hint("pick the SCL pin");
        pickHandler = p2 => { bus.scl = p2; refresh(); };
        draw();
      };
      refresh();
    };
  }

  function renderFailsafe() {
    const ta = document.getElementById("fsloss");
    ta.value = nl.failsafe.rx_loss || "";
    ta.onchange = () => { nl.failsafe.rx_loss = ta.value; refresh(); };
    const el = document.getElementById("fspins");
    el.innerHTML = "stop pins: " + (nl.failsafe.stop_pins.join(" · ") || "—") + " ";
    const b = document.createElement("button");
    b.className = "mini"; b.textContent = "+ stop pin";
    b.addEventListener("click", () => {
      hint("pick a stop pin (e.g. the ESC signal inputs)");
      pickHandler = pin => {
        if (!nl.failsafe.stop_pins.includes(pin)) nl.failsafe.stop_pins.push(pin);
      };
    });
    el.appendChild(b);
    const clr = document.createElement("button");
    clr.className = "mini"; clr.textContent = "clear";
    clr.addEventListener("click", () => { nl.failsafe.stop_pins = []; refresh(); });
    el.appendChild(clr);
  }

  // ---- live checks --------------------------------------------------------------
  let checkTimer = null;
  function runChecksSoon() {
    clearTimeout(checkTimer);
    checkTimer = setTimeout(() => {
      const res = callChecks(nl);
      const verdict = document.getElementById("verdict");
      const el = document.getElementById("checks");
      if (res.error) {
        verdict.className = "bad";
        verdict.textContent = "SCHEMA: " + res.error;
        el.innerHTML = "";
        return;
      }
      const fails = res.checks.filter(c => !c.pass);
      verdict.className = fails.length ? "bad" : "ok";
      verdict.textContent = fails.length
        ? `E-CHECK FAILURES (${fails.length}) — do not solder`
        : "HARNESS LEGAL — all checks pass";
      el.innerHTML = res.checks.map(c => {
        const col = c.pass ? "var(--ok)" : "var(--bad)";
        return `<div class="check"><span class="pill" style="background:${col}">${c.pass ? "PASS" : "FAIL"}</span>` +
          `<span>${c.code}</span><span class="d">${c.detail}</span></div>`;
      }).join("");
    }, 250);
  }

  // ---- io -------------------------------------------------------------------------
  const dlg = document.getElementById("ioDialog");
  document.getElementById("exportBtn").addEventListener("click", () => {
    document.getElementById("ioTitle").textContent = "netlist json — canonical (layout not included)";
    document.getElementById("ioText").value = JSON.stringify(nl, null, 2);
    document.getElementById("ioApply").style.display = "none";
    dlg.showModal();
  });
  document.getElementById("importBtn").addEventListener("click", () => {
    document.getElementById("ioTitle").textContent = "paste netlist json";
    document.getElementById("ioText").value = "";
    document.getElementById("ioApply").style.display = "";
    dlg.showModal();
  });
  document.getElementById("ioApply").addEventListener("click", () => {
    try {
      nl = JSON.parse(document.getElementById("ioText").value);
      if (!nl.failsafe) nl.failsafe = { rx_loss: "", stop_pins: [] };
      if (!nl.buses) nl.buses = [];
      layout = {};
      try { layout = JSON.parse(localStorage.getItem(LAYOUT_KEY()) || "{}"); } catch {}
      dlg.close(); refresh();
    } catch (e) { alert("parse error: " + e.message); }
  });
  document.getElementById("ioDownload").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(nl, null, 2) + "\n"], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = nl.name + ".json";
    a.click();
  });
  document.getElementById("ioClose").addEventListener("click", () => dlg.close());
  const nameEl = document.getElementById("nlname");
  nameEl.addEventListener("change", () => { nl.name = nameEl.value; refresh(); });

  // ---- refresh --------------------------------------------------------------------
  function refresh() {
    nameEl.value = nl.name;
    renderLayers();
    renderExamples();
    renderPalette();
    renderNets();
    renderBuses();
    renderFailsafe();
    renderSelInfo();
    draw();
    runChecksSoon();
  }
  window.addEventListener("resize", resize);
  refresh();
  resize();
})();
</script>
</body>
</html>
