<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>robowire designer</title>
<style>
  :root {
    --bg: #0d1114; --panel: #161c20; --panel2: #1d2429; --line: #2a3339;
    --ink: #e6e9e4; --dim: #8b969b; --accent: #e8a33d; --ok: #57b48f; --bad: #e05c50;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink); overflow: hidden;
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    display: grid; grid-template-columns: 240px 1fr 340px; grid-template-rows: 48px 1fr;
    grid-template-areas: "head head head" "left canvas right";
  }
  header {
    grid-area: head; display: flex; align-items: center; gap: 12px; padding: 0 14px;
    border-bottom: 1px solid var(--line); background: var(--panel);
  }
  header h1 {
    margin: 0; font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase;
    font-family: "Avenir Next Condensed", "Arial Narrow", sans-serif;
  }
  header input#nlname {
    background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
    border-radius: 4px; padding: 4px 8px; font-family: ui-monospace, Menlo, monospace; font-size: 12px;
    width: 220px;
  }
  header .spacer { flex: 1; }
  button {
    background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
    border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 12px;
    font-family: ui-monospace, Menlo, monospace;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #14100a; font-weight: 700; border-color: var(--accent); }
  button.mini { padding: 1px 7px; font-size: 10px; }
  #left { grid-area: left; border-right: 1px solid var(--line); overflow-y: auto; padding: 10px; background: var(--panel); }
  #right { grid-area: right; border-left: 1px solid var(--line); overflow-y: auto; padding: 10px; background: var(--panel); }
  #board { grid-area: canvas; display: block; width: 100%; height: 100%; cursor: default; }
  h2 {
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim);
    font-family: "Avenir Next Condensed", "Arial Narrow", sans-serif; margin: 12px 0 6px;
  }
  .part {
    display: flex; justify-content: space-between; align-items: center; gap: 6px;
    padding: 5px 7px; border: 1px solid var(--line); border-radius: 4px; margin-bottom: 5px;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
  }
  .part .k { color: var(--dim); font-size: 9px; }
  .row {
    border: 1px solid var(--line); border-radius: 4px; padding: 6px 8px; margin-bottom: 6px;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
  }
  .row.sel { border-color: var(--accent); }
  .row .hd { display: flex; gap: 6px; align-items: center; }
  .row input, .row select {
    background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
    border-radius: 3px; padding: 2px 5px; font-family: inherit; font-size: 11px;
  }
  .row input.id { width: 88px; }
  .row input.volts { width: 48px; }
  .row .pins { color: var(--dim); margin-top: 4px; overflow-wrap: anywhere; }
  .runrow input[type=range] { width: 170px; vertical-align: middle; }
  .runrow input[type=number] { width: 64px; }
  .runrow .runToggle { min-width: 34px; }
  .check { display: flex; gap: 7px; align-items: baseline; padding: 3px 0; font-family: ui-monospace, Menlo, monospace; font-size: 11px; }
  .check .pill { font-weight: 700; padding: 0 6px; border-radius: 3px; font-size: 10px; color: #0d1114; flex-shrink: 0; }
  .check .d { color: var(--dim); }
  #selinfo {
    border: 1px solid var(--accent); border-radius: 6px; padding: 8px 10px; margin: 10px 0 4px;
  }
  #selinfo .about { font-size: 12.5px; line-height: 1.5; text-wrap: pretty; margin: 4px 0; }
  #selinfo .meta { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: var(--dim); overflow-wrap: anywhere; }
  #selinfo .chip { display: inline-block; font-size: 10px; letter-spacing: 0.1em; padding: 0 7px; border-radius: 3px; font-weight: 700; color: #0d1114; }
  #selinfo ul { margin: 5px 0 0; padding-left: 0; list-style: none; font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; }
  #selinfo li { margin-top: 3px; overflow-wrap: anywhere; }
  #verdict { font-family: ui-monospace, Menlo, monospace; font-weight: 700; padding: 6px 8px; border-radius: 4px; margin-bottom: 6px; }
  #verdict.ok { background: color-mix(in srgb, var(--ok) 22%, transparent); color: var(--ok); }
  #verdict.bad { background: color-mix(in srgb, var(--bad) 22%, transparent); color: var(--bad); }
  #hint { position: fixed; bottom: 10px; left: 254px; color: var(--dim); font-size: 11px;
    background: color-mix(in srgb, var(--panel) 85%, transparent); padding: 4px 10px; border-radius: 4px; }
  dialog {
    background: var(--panel); color: var(--ink); border: 1px solid var(--line); border-radius: 8px;
    max-width: 640px; width: 80vw;
  }
  dialog::backdrop { background: rgba(0,0,0,0.6); }
  dialog textarea { width: 100%; height: 300px; background: var(--panel2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px; font: 11px ui-monospace, Menlo, monospace; }
  textarea#fsloss { width: 100%; height: 54px; background: var(--panel2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px; font: 11px ui-monospace, Menlo, monospace; }
  label.ck { display: flex; gap: 6px; align-items: center; font-size: 11px; font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
<header>
  <h1>robowire <span style="color:var(--accent)">designer</span></h1>
  <input id="nlname" title="netlist name">
  <span class="spacer"></span>
  <button id="modeBtn">3D view</button>
  <button id="arrangeBtn">auto-arrange</button>
  <button id="importBtn">import</button>
  <button id="exportBtn" class="primary">export netlist</button>
  <button id="runBtn">run mode</button>
  <button id="teachBtn">teaching mode</button>
</header>
<div id="left">
  <h2>layers</h2>
  <div id="layerToggles"></div>
  <h2>examples — click to load</h2>
  <div id="examples"></div>
  <h2>parts catalogue — drag onto the board</h2>
  <input id="partFilter" placeholder="filter parts…" style="width:100%;margin-bottom:6px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:4px;padding:4px 8px;font:11px ui-monospace,Menlo,monospace">
  <div id="palette"></div>
</div>
<canvas id="board"></canvas>
<div id="right">
  <div id="runPanel" style="display:none"></div>
  <div id="teachPanel" style="display:none;border:1px solid var(--accent);border-radius:6px;padding:8px 10px;margin-bottom:8px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.5"></div>
  <div id="verdict"></div>
  <div id="checks"></div>
  <div id="selinfo" style="display:none"></div>
  <h2>nets — click a pin, then another, to wire</h2>
  <div id="nets"></div>
  <h2>i2c buses</h2>
  <div id="buses"></div>
  <button id="addBus" class="mini">+ add bus</button>
  <h2>failsafe declaration (E41)</h2>
  <textarea id="fsloss" placeholder="what happens on radio loss…"></textarea>
  <div id="fspins" style="margin-top:4px"></div>
</div>
<div id="hint"></div>
<div id="dbg" style="position:fixed;bottom:10px;right:14px;color:var(--dim);font:10px ui-monospace,Menlo,monospace;background:color-mix(in srgb, var(--panel) 85%, transparent);padding:3px 8px;border-radius:4px">build 52a0d566</div>
<dialog id="ioDialog">
  <h2 id="ioTitle">netlist json</h2>
  <textarea id="ioText"></textarea>
  <div style="display:flex; gap:8px; margin-top:8px">
    <button id="ioApply" class="primary">apply</button>
    <button id="ioDownload">download file</button>
    <button id="ioClose">close</button>
  </div>
</dialog>
<script>
const PARTS =
[{"current_ma":15.0,"description":"The motor controller (ESC). It turns the brain's throttle commands into switched battery power for the two drive motors, and its built-in 5V regulator (the BEC) powers the brain and radio.","elec":{"pins":{"BEC5V":{"max_a":1.0,"role":"power_out","volts":5.0},"GND":{"required":true,"role":"gnd"},"M1+":{"channel":"M1","role":"motor_out"},"M1-":{"channel":"M1","role":"motor_out"},"M2+":{"channel":"M2","role":"motor_out"},"M2-":{"channel":"M2","role":"motor_out"},"S1":{"channel":"M1","required":true,"role":"signal_in","signal":"pwm"},"S2":{"channel":"M2","required":true,"role":"signal_in","signal":"pwm"},"VIN":{"required":true,"role":"power_in","v_range":[6.0,9.0]}}},"id":"bbb-dual-esc","kind":"esc","mass_g":5.0,"nominal_v":7.4,"notes":"dual brushed ESC with 5V BEC; ~15mA quiescent (excludes motor current and whatever the BEC passes on to the 5V rail)","provisional":true},{"current_ma":20.0,"description":"The weapon's motor controller. Unlike the drive ESC, it only drives one motor (the spinner/hammer/lifter's weapon) and usually has no onboard 5V regulator of its own.","elec":{"pins":{"GND":{"required":true,"role":"gnd"},"M1+":{"channel":"M1","role":"motor_out"},"M1-":{"channel":"M1","role":"motor_out"},"S1":{"channel":"M1","required":true,"role":"signal_in","signal":"pwm"},"VIN":{"required":true,"role":"power_in","v_range":[6.0,16.8]}}},"id":"brushless-esc-weapon","kind":"esc","mass_g":6.0,"nominal_v":11.1,"notes":"single-channel brushless ESC for a weapon motor; no BEC of its own — the brain's 5V typically comes from the drive ESC instead. 3-phase commutation happens inside the ESC and isn't modelled here (not SPICE) — from the battery's perspective this is checked the same way as any other motor driver: polarity, channel resolution, worst-case current budget, wire gauge.","provisional":true},{"description":"The weapon motor: spins a disc, bar, or drum at high RPM. Draws far more current under a stall (a jam, a hit) than a drive motor ever does — exactly the worst case E30/E31 exist to catch.","elec":{"pins":{"M+":{"required":true,"role":"motor_in"},"M-":{"required":true,"role":"motor_in"}}},"id":"brushless-motor-weapon","kind":"motor","mass_g":22.0,"motor":{"no_load_rpm":32000.0,"nominal_v":11.1,"stall_current_a":18.0,"stall_torque_mnm":60.0},"notes":"small outrunner brushless weapon motor; 3-phase winding modelled as an equivalent 2-wire interface (same simplification as brushless-esc-weapon) — real per-phase commutation current isn't simulated, just the worst-case stall draw a power budget needs to catch.","provisional":true},{"current_ma":30.0,"description":"An active buzzer: give it 5V and it screams — the classic 'robot is alive / battery is dying' indicator. Polarity matters.","elec":{"pins":{"+":{"required":true,"role":"power_in","v_range":[3.0,5.5]},"-":{"required":true,"role":"gnd"}}},"id":"buzzer-active-5v","kind":"buzzer","mass_g":1.5,"nominal_v":5.0,"notes":"active piezo, ~30mA","provisional":true},{"description":"A single motor-phase bullet connector, sized to how much continuous current that phase actually carries.","elec":{"pins":{"P1":{"required":true,"role":"passive"},"P2":{"required":true,"role":"passive"}}},"id":"connector-bullet-3.5mm","kind":"connector","mass_g":0.4,"notes":"a single 3.5mm bullet connector pair — the usual choice for a motor phase wire (one pair per phase; a brushless motor needs three of these, one per phase, in the real world — this catalogue's simplified 2-wire motor model only needs one to check the equivalent interface).","provisional":true,"rated_a":15.0},{"description":"The battery connector: a mating pair in the main power path, so the pack can be unplugged rather than desoldered. Rated for a worst-case current like any other part in the chain — an undersized connector is exactly as dangerous as an undersized wire.","elec":{"pins":{"P1":{"required":true,"role":"passive"},"P2":{"required":true,"role":"passive"}}},"id":"connector-xt30","kind":"connector","mass_g":1.2,"notes":"XT30-style bullet connector pair, 30A rated","provisional":true,"rated_a":30.0},{"description":"A bigger battery connector than XT30, rated for a worst-case current like any other part in the chain — an undersized connector is exactly as dangerous as an undersized wire.","elec":{"pins":{"P1":{"required":true,"role":"passive"},"P2":{"required":true,"role":"passive"}}},"id":"connector-xt60","kind":"connector","mass_g":2.5,"notes":"XT60-style bullet connector pair, 60A rated — a size up from XT30, for builds whose worst-case current is getting close to XT30's headroom.","provisional":true,"rated_a":60.0},{"current_ma":50.0,"description":"The radio receiver. It picks up the driver's transmitter and streams stick positions to the brain; when the link dies, it is the first domino in the failsafe chain.","elec":{"pins":{"GND":{"required":true,"role":"gnd"},"TX":{"required":true,"role":"signal_out","signal":"uart"},"VIN":{"required":true,"role":"power_in","v_range":[4.5,5.5]}}},"id":"elrs-rx","kind":"radio","mass_g":1.0,"nominal_v":5.0,"notes":"ELRS receiver, CRSF out; ~50mA typical","provisional":true},{"description":"A resettable fuse in the main power path: it goes high-resistance and cuts current if the rail is ever pushed past its rating, then resets itself once things cool down. The cheap insurance against a wiring mistake or a jammed motor turning into smoke.","elec":{"pins":{"P1":{"required":true,"role":"passive"},"P2":{"required":true,"role":"passive"}}},"id":"fuse-ptc-5a","kind":"ptc","mass_g":0.6,"notes":"self-resetting PTC, 5A hold current","provisional":true,"rated_a":5.0},{"current_ma":1.0,"description":"The motion sensor. It measures acceleration and rotation so the brain knows how the robot is actually moving — the foundation of braking and flip detection.","elec":{"bus":{"addr_reassignable":false,"default_addr":"0x68","io_v":3.3,"kind":"i2c","requires_xshut":false},"pins":{"GND":{"required":true,"role":"gnd"},"SCL":{"required":true,"role":"bus_scl"},"SDA":{"required":true,"role":"bus_sda"},"VIN":{"required":true,"role":"power_in","v_range":[1.7,3.6]}}},"id":"imu-icm42688","kind":"imu","mass_g":1.0,"nominal_v":3.3,"notes":"IMU breakout; ~1mA active (datasheet-typical low-power mode)","provisional":true},{"description":"A green indicator light — same rules as its red sibling: anode in, cathode out, and always a series resistor.","elec":{"pins":{"A":{"required":true,"role":"diode_a"},"K":{"required":true,"role":"diode_k"}}},"forward_v":2.2,"id":"led-green-5mm","kind":"led","mass_g":0.3,"notes":"forward ~2.2V @ 20mA rated (actual live current = (V - forward_v) / series resistor, robowire run mode)","provisional":true},{"description":"A red indicator light. Current flows in through the long leg (anode) and out the short leg (cathode) — and it MUST have a resistor in series, or it burns out the instant power arrives.","elec":{"pins":{"A":{"required":true,"role":"diode_a"},"K":{"required":true,"role":"diode_k"}}},"forward_v":2.0,"id":"led-red-5mm","kind":"led","mass_g":0.3,"notes":"forward ~2.0V @ 20mA rated (actual live current = (V - forward_v) / series resistor, robowire run mode)","provisional":true},{"description":"The robot's fuel tank: a two-cell lithium battery. Everything on the robot ultimately draws its power from here.","elec":{"pins":{"+":{"required":true,"role":"pos"},"-":{"required":true,"role":"gnd"}},"source":{"c_rating":30.0,"capacity_mah":260.0,"r_internal_ohm":0.18,"volts":7.4}},"id":"lipo-2s-260","kind":"battery","mass_g":18.0,"notes":"2S 260mAh; sag curve fitted later","provisional":true},{"description":"A bigger, higher-voltage three-cell pack for builds that need more headroom than the 2S 260mAh option — more punch per motor, at the cost of more mass and a stricter voltage-range check on every downstream part.","elec":{"pins":{"+":{"required":true,"role":"pos"},"-":{"required":true,"role":"gnd"}},"source":{"c_rating":25.0,"capacity_mah":450.0,"r_internal_ohm":0.12,"volts":11.1}},"id":"lipo-3s-450","kind":"battery","mass_g":34.0,"notes":"3S 450mAh; higher-voltage option for stronger drive motors","provisional":true},{"description":"A higher-capacity three-cell pack for builds that need real headroom under a weapon motor's stall current, not just a drive motor's — more mass than lipo-3s-450, in exchange for a rail that doesn't trip E30 the moment a weapon is added.","elec":{"pins":{"+":{"required":true,"role":"pos"},"-":{"required":true,"role":"gnd"}},"source":{"c_rating":35.0,"capacity_mah":850.0,"r_internal_ohm":0.07,"volts":11.1}},"id":"lipo-3s-850","kind":"battery","mass_g":58.0,"notes":"3S 850mAh; the size step up from lipo-3s-450 for builds with a weapon motor's much higher stall draw","provisional":true},{"description":"A geared drive motor. It spins one wheel: drive both motors the same way to go straight, opposite ways to spin on the spot.","elec":{"pins":{"M+":{"required":true,"role":"motor_in"},"M-":{"required":true,"role":"motor_in"}}},"id":"n20-motor-6v","kind":"motor","mass_g":9.0,"motor":{"no_load_rpm":1000.0,"nominal_v":6.0,"stall_current_a":1.6,"stall_torque_mnm":20.0},"notes":"brushed N20 gearmotor, 6V winding; curve fitted at Station 2 later","provisional":true},{"description":"A variable resistor: twist the dial and the resistance — and so the current it lets through — changes live. Wired here as a simple two-leg rheostat, the same role a fixed resistor plays, except the value moves.","elec":{"pins":{"P1":{"role":"passive"},"P2":{"role":"passive"}}},"id":"potentiometer-10k","kind":"potentiometer","mass_g":1.0,"notes":"10k linear pot wired as a 2-terminal rheostat (wiper strapped to one end); dial at 0.0 = min resistance (brightest), 1.0 = max resistance (dimmest)","ohms_max":10000.0,"ohms_min":20.0,"provisional":true},{"description":"A smaller-range variable resistor than the 10k — a 10x span instead of 500x, so the whole dial does something useful for a single LED dimmer instead of cramming the visible brightness range into the first few percent of travel.","elec":{"pins":{"P1":{"role":"passive"},"P2":{"role":"passive"}}},"id":"potentiometer-1k","kind":"potentiometer","mass_g":0.8,"notes":"1k linear pot wired as a 2-terminal rheostat (wiper strapped to one end); dial at 0.0 = min resistance (brightest), 1.0 = max resistance (dimmest)","ohms_max":1000.0,"ohms_min":100.0,"provisional":true},{"description":"The master on/off switch. It sits directly in the battery's positive line, so switching off cuts power to absolutely everything — a competition tech-check requirement.","elec":{"pins":{"in":{"required":true,"role":"switch_in"},"out":{"required":true,"role":"switch_out"}}},"id":"power-switch-slide","kind":"switch","mass_g":1.5,"notes":"main-path switch (tech-check E40)","provisional":true},{"current_ma":5.0,"description":"A small 5-volt regulator: feed it raw battery voltage and it puts out a clean 5V — the safe way to power the brain when there's no ESC with a built-in BEC around.","elec":{"pins":{"GND":{"required":true,"role":"gnd"},"OUT":{"max_a":0.8,"role":"power_out","volts":5.0},"VIN":{"required":true,"role":"power_in","v_range":[6.5,9.0]}}},"id":"reg-5v-mini","kind":"regulator","mass_g":1.0,"nominal_v":7.4,"notes":"mini buck/linear 5V regulator, ~0.8A max output; ~5mA quiescent draw on its own input","provisional":true},{"description":"A removable link: pull it out and the robot is provably dead, with nothing to flip or trust to actually be off. A common alternative to a physical switch on antweights — same tech-check requirement (E40), same role in the circuit.","elec":{"pins":{"in":{"required":true,"role":"switch_in"},"out":{"required":true,"role":"switch_out"}}},"id":"removable-link","kind":"switch","mass_g":0.8,"notes":"a removable jumper/link in the battery-positive path (E40) — physically pulled out rather than flipped, but electrically (and in run mode) it plays the same on/off role as a physical switch.","provisional":true},{"description":"A 1000-ohm resistor: dimmer LED current, pull-ups/pull-downs, or gentle signal limiting.","elec":{"pins":{"P1":{"role":"passive"},"P2":{"role":"passive"}}},"id":"resistor-1k","kind":"resistor","mass_g":0.2,"notes":"1k ohm, 1/4W","ohms":1000.0,"provisional":true},{"description":"A 330-ohm resistor: the standard current limiter for an LED on a 3.3-5V rail. Either leg first — resistors don't care about direction.","elec":{"pins":{"P1":{"role":"passive"},"P2":{"role":"passive"}}},"id":"resistor-330r","kind":"resistor","mass_g":0.2,"notes":"330 ohm, 1/4W","ohms":330.0,"provisional":true},{"current_ma":40.0,"description":"The brain. It runs the reflex kernel: reads the sensors, listens to the radio, and commands the motor controller. Its onboard regulator also feeds the 3.3V sensors.","elec":{"pins":{"3V3":{"max_a":0.3,"role":"power_out","volts":3.3},"5V":{"required":true,"role":"power_in","v_range":[4.5,5.5]},"GND":{"required":true,"role":"gnd"},"GP1":{"caps":["uart_rx","gpio"],"role":"mcu_io"},"GP2":{"caps":["pwm","gpio"],"role":"mcu_io"},"GP3":{"caps":["pwm","gpio"],"role":"mcu_io"},"GP4":{"caps":["i2c_sda","gpio"],"role":"mcu_io"},"GP5":{"caps":["i2c_scl","gpio"],"role":"mcu_io"},"GP6":{"caps":["gpio"],"role":"mcu_io"},"GP7":{"caps":["gpio"],"role":"mcu_io"}}},"id":"rp2350-zero","kind":"mcu","mass_g":2.5,"nominal_v":5.0,"notes":"RP2350 board; reflex organ host; ~40mA typical active draw (datasheet-approximate, excludes 3V3 rail loads)","provisional":true},{"current_ma":200.0,"description":"A small hobby servo: send it a PWM position command and it holds an angle. The usual choice for a weapon lifter or flipper arm on a kit-class bot — a different current profile from a continuously-spinning drive motor, since it mostly just holds position.","elec":{"pins":{"+":{"required":true,"role":"power_in","v_range":[4.8,6.0]},"-":{"required":true,"role":"gnd"},"SIG":{"required":true,"role":"signal_in","signal":"pwm"}}},"id":"servo-9g-lifter","kind":"servo","mass_g":9.0,"nominal_v":5.0,"notes":"9g micro servo; ~200mA typical active draw (datasheet-approximate, not stall)","provisional":true},{"description":"A momentary push button: the two legs connect while pressed. Useful for a boot/pair/test input to the brain.","elec":{"pins":{"A":{"role":"passive"},"B":{"role":"passive"}}},"id":"tact-button","kind":"button","mass_g":0.4,"notes":"momentary, normally open","provisional":true},{"current_ma":19.0,"description":"A floor sensor: a tiny downward-pointing laser rangefinder. When the floor suddenly reads far away, the robot is about to drive off the edge — this is the failsafe's eyes.","elec":{"bus":{"addr_reassignable":true,"default_addr":"0x29","io_v":3.3,"kind":"i2c","requires_xshut":true},"pins":{"GND":{"required":true,"role":"gnd"},"SCL":{"required":true,"role":"bus_scl"},"SDA":{"required":true,"role":"bus_sda"},"VIN":{"required":true,"role":"power_in","v_range":[2.6,5.5]},"XSHUT":{"role":"gpio_in"}}},"fov_deg":25.0,"id":"vl53l0x-breakout","kind":"tof","mass_g":1.0,"nominal_v":3.3,"notes":"downward edge-detection ToF; dual units need XSHUT reassignment (robowire E20); ~19mA active","provisional":true,"range_mm":1200.0},{"description":"A foam drive wheel. Grip is the whole game at this weight class.","id":"wheel-32-foam","kind":"wheel","mass_g":3.0,"notes":"32mm foam wheel + hub","provisional":true,"tyre":{"mu_kinetic_ratio":0.85,"mu_max":0.7,"mu_min":0.4},"wheel_radius_mm":16.0,"wheel_width_mm":8.0}];

      if (i === selNet) {
        cx.font = "bold 9px ui-monospace, Menlo, monospace";
        for (const ep of net.pins) {
          const q = pinXY(ep);
          if (!q) continue;
          const lx = q[0] + (q[2] || 0) * (STUB + 6), ly = q[1] + (q[3] || 0) * (STUB + 6);
          cx.fillStyle = "#0d1114";
          const wdt = cx.measureText(ep).width;
          cx.fillRect(lx - (q[2] < 0 ? wdt : 0) - 2, ly - 8, wdt + 4, 11);
          cx.fillStyle = col;
          cx.textAlign = q[2] < 0 ? "right" : "left";
          cx.fillText(ep, lx, ly);
          cx.textAlign = "left";
        }
      }
    });
    // bus wires
    for (const bus of (layerOn.i2c ? nl.buses : [])) {
      const m = pinXY(bus.sda);
      if (!m) continue;
      for (const dev of bus.devices) {
        const dpin = pinXY(dev.inst + ".SDA");
        if (!dpin) continue;
        cx.strokeStyle = COLORS.i2c; cx.lineWidth = 1.8; cx.setLineDash([7, 4]);
        cx.beginPath();
        cx.moveTo(m[0], m[1]);
        cx.bezierCurveTo(
          m[0] + (m[2] || 0) * 50, m[1] + (m[3] || 0) * 50,
          dpin[0] + (dpin[2] || 0) * 50, dpin[1] + (dpin[3] || 0) * 50,
          dpin[0], dpin[1]);
        cx.stroke(); cx.setLineDash([]);
      }
    }

    // 3) pins — always-on-top plugs (colored = wired, hollow = free)
    for (const inst of Object.keys(nl.instances)) {
      if (!instVisible(inst)) continue;
      const g = boxGeo(inst);
      for (const [pin, [px, py, ox, oy]] of Object.entries(g.pinPos)) {
        const ep = inst + "." + pin;
        const active = pending === ep;
        const wired = pinColors[ep];
        if (active) {
          cx.fillStyle = "#e8a33d";
          cx.beginPath(); cx.arc(px, py, 5, 0, Math.PI * 2); cx.fill();
        } else if (wired) {
          cx.fillStyle = wired;
          cx.beginPath(); cx.arc(px, py, 4, 0, Math.PI * 2); cx.fill();
        } else {
          cx.strokeStyle = "#6b787f"; cx.lineWidth = 1.2;
          cx.beginPath(); cx.arc(px, py, 3, 0, Math.PI * 2); cx.stroke();
        }
        cx.fillStyle = "#8b969b";
        cx.font = "8.5px ui-monospace, Menlo, monospace";
        cx.textAlign = ox < -0.3 ? "right" : ox > 0.3 ? "left" : "center";
        cx.fillText(pin, px + ox * 9, py + oy * 9 + 3);
        cx.textAlign = "left";
      }
    }

    if (wireDrag && wireDrag.moved) {
      const sp = pinXY(wireDrag.from);
      if (sp) {
        cx.strokeStyle = "#e8a33d"; cx.lineWidth = 1.6; cx.setLineDash([6, 4]);
        cx.beginPath(); cx.moveTo(sp[0], sp[1]); cx.lineTo(wireDrag.cur[0], wireDrag.cur[1]); cx.stroke();
        cx.setLineDash([]);
      }
    }
    hint(wireDrag && wireDrag.moved ? `release on a pin to connect ${wireDrag.from}` :
      dragWireNet != null ? "dragging wire bend — release to drop, double-click it to straighten" :
      pending ? `wiring from ${pending} — click another pin, or drag from a pin (esc cancels)` :
      pickHandler ? "pick a pin…" :
      selInst ? `${selInst} selected — drag to move, R rotates, ✕ or Delete removes` :
      selNet >= 0 ? "net selected — drag its path to bend it, double-click to straighten, Delete removes it" : "");
  }
  function roundRect(x, y, w, h, r) {
    cx.beginPath();
    cx.moveTo(x + r, y); cx.arcTo(x + w, y, x + w, y + h, r); cx.arcTo(x + w, y + h, x, y + h, r);
    cx.arcTo(x, y + h, x, y, r); cx.arcTo(x, y, x + w, y, r); cx.closePath();
  }

// designer/08-render3d.js — 3D renderer
  function stroke3(pts, color, width, dashed, glow) {
    cx.beginPath();
    let started = false;
    for (const pt of pts) {
      const q = project3(pt);
      if (!q) { started = false; continue; }
      if (!started) { cx.moveTo(q[0], q[1]); started = true; }
      else cx.lineTo(q[0], q[1]);
    }
    cx.strokeStyle = color; cx.lineWidth = width;
    cx.setLineDash(dashed ? [6, 5] : []);
    if (glow) { cx.shadowColor = color; cx.shadowBlur = 9; }
    cx.stroke();
    cx.shadowBlur = 0; cx.setLineDash([]);
  }
  function draw3() {
    pc = planeCenter();
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx.clearRect(0, 0, cv.clientWidth, cv.clientHeight);
    for (let g = -300; g <= 300; g += 60) {
      stroke3([[pc[0] + g, pc[1] - 300, 0], [pc[0] + g, pc[1] + 300, 0]], "#151b20", 1, false, false);
      stroke3([[pc[0] - 300, pc[1] + g, 0], [pc[0] + 300, pc[1] + g, 0]], "#151b20", 1, false, false);
    }
    nl.nets.forEach((net, i) => {
      const cls = netClass(net);
      if (!layerOn[cls]) return;
      let col = COLORS[cls] || "#999";
      let flowing = false;
      if (runMode) {
        const ns = runState.nets && runState.nets[net.id];
        flowing = !!(ns && ns.amps > 0.001);
        if (flowing) col = "#57b48f"; // green — current is actually flowing here
      }
      const selW = i === selNet;
      if (flowing) cx.lineDashOffset = -spinPhase * 14;
      for (const arc of netArcs3(net, i)) stroke3(arc, col, selW ? 3 : 1.8, flowing, true);
      if (!runMode) {
        const bend = net.pins.length === 2 ? wireBendOf(net.id) : null;
        if (bend) {
          const ends = net.pins.map(pin3).filter(Boolean);
          const z = bend[2] != null ? bend[2] : defaultWireLift3(net, i, ends);
          const q = project3([bend[0], bend[1], z]);
          if (q) {
            const s = i === selNet || dragWireNet === i ? 5 : 3.6;
            cx.fillStyle = i === selNet || dragWireNet === i ? "#e8a33d" : col;
            cx.beginPath();
            cx.moveTo(q[0], q[1] - s); cx.lineTo(q[0] + s, q[1]);
            cx.lineTo(q[0], q[1] + s); cx.lineTo(q[0] - s, q[1]);
            cx.closePath(); cx.fill();
          }
        }
      }
    });
    for (const bus of (layerOn.i2c ? nl.buses : [])) {
      const m = pin3(bus.sda);
      if (!m) continue;
      for (const dev of bus.devices) {
        const d = pin3(dev.inst + ".SDA");
        if (d) stroke3(arc3(m, d, CLASS_LIFT.i2c), COLORS.i2c, 1.8, true, true);
      }
    }
    const pinColors3 = computePinColors();
    for (const inst of Object.keys(nl.instances)) {
      if (!instVisible(inst)) continue;
      const g = geo3(inst);
      const isSel = inst === selInst;
      const col = isSel || (pending && splitPin(pending)[0] === inst) ? "#e8a33d" : "#5b6a73";
      const c = [];
      for (const sx of [-1, 1]) for (const sy of [-1, 1]) for (const sz of [0, 1])
        c.push([g.x + sx * g.W / 2, g.y + sy * g.D / 2, sz * g.h]);
      const edges = [[0,1],[2,3],[4,5],[6,7],[0,2],[1,3],[4,6],[5,7],[0,4],[1,5],[2,6],[3,7]];
      for (const [a, b] of edges) stroke3([c[a], c[b]], col, isSel ? 2 : 1.2, false, false);
      const q = project3([g.x, g.y, g.h + 10]);
      if (q) {
        cx.fillStyle = isSel ? "#e8a33d" : "#c7ced2";
        cx.font = "11px ui-monospace, Menlo, monospace";
        cx.fillText(inst, q[0] - 12, q[1]);
      }
      for (const [pin, pp] of Object.entries(g.pinPos3)) {
        const ep = inst + "." + pin;
        const q2 = project3(pp);
        if (!q2) continue;
        const active = pending === ep;
        const wired = pinColors3[ep];
        if (active) {
          cx.fillStyle = "#e8a33d";
          cx.beginPath(); cx.arc(q2[0], q2[1], 5, 0, Math.PI * 2); cx.fill();
        } else if (wired) {
          cx.fillStyle = wired;
          cx.beginPath(); cx.arc(q2[0], q2[1], 3.6, 0, Math.PI * 2); cx.fill();
        } else {
          cx.strokeStyle = "#6b787f"; cx.lineWidth = 1;
          cx.beginPath(); cx.arc(q2[0], q2[1], 2.8, 0, Math.PI * 2); cx.stroke();
        }
      }
      if (runMode) {
        const bq = project3([g.x, g.y, g.h / 2]);
        if (bq) drawRunOverlay3d(inst, bq);
      }
    }
    if (wireDrag && wireDrag.moved) {
      const wp = pin3(wireDrag.from);
      const sp = wp && project3(wp);
      if (sp) {
        cx.strokeStyle = "#e8a33d"; cx.lineWidth = 1.6; cx.setLineDash([6, 4]);
        cx.beginPath(); cx.moveTo(sp[0], sp[1]); cx.lineTo(wireDrag.cur[0], wireDrag.cur[1]); cx.stroke();
        cx.setLineDash([]);
      }
    }
    hint(wireDrag && wireDrag.moved ? `release on a pin to connect ${wireDrag.from}` :
      pending ? `wiring from ${pending} — click another pin, or drag from a pin (esc cancels)` :
      pickHandler ? "pick a pin…" :
      "3D — drag empty space to orbit, wheel to zoom; switch to 2D to rearrange");
  }

  const ARRANGE_ROWS = [
    ["battery", "connector", "fuse", "ptc", "switch", "regulator"],
    ["esc", "motor", "servo"],
    ["mcu"],
    ["tof", "imu", "radio"],
    ["led", "resistor", "potentiometer", "buzzer", "button"],
  ];
  function autoArrange() {
    const insts = Object.keys(nl.instances);
    if (!insts.length) return;
    const rowOf = inst => {
      const k = kindOf(inst);
      const idx = ARRANGE_ROWS.findIndex(r => r.includes(k));
      return idx >= 0 ? idx : ARRANGE_ROWS.length;
    };
    const byRow = new Map();
    for (const inst of insts.sort()) {
      const r = rowOf(inst);
      if (!byRow.has(r)) byRow.set(r, []);
      byRow.get(r).push(inst);
    }
    // Connectivity graph, weighted per net by 1/(members-1): a net with many
    // members (ground, most often) touches almost everything, so its pull on
    // any ONE neighbor is diffuse and shouldn't dominate — letting it do so
    // is exactly what turns into a long diagonal wire crossing unrelated
    // boxes. A net with just two members (the common case: one specific
    // rail between exactly these two parts) pulls at full strength, since
    // THAT connection is the one actually worth keeping short and aligned.
    const adj = new Map(insts.map(i => [i, new Map()]));
    const link = (a, b, weight) => {
      if (a === b || !adj.has(a) || !adj.has(b)) return;
      adj.get(a).set(b, (adj.get(a).get(b) || 0) + weight);
      adj.get(b).set(a, (adj.get(b).get(a) || 0) + weight);
    };
    for (const net of nl.nets) {
      const is = [...new Set(net.pins.map(pn => splitPin(pn)[0]))];
      const weight = 1 / Math.max(1, is.length - 1);
      for (let i = 0; i < is.length; i++) for (let j = i + 1; j < is.length; j++) link(is[i], is[j], weight);
    }
    for (const bus of nl.buses) {
      const m = splitPin(bus.sda)[0];
      const fanout = 1 + bus.devices.length;
      const weight = 1 / Math.max(1, fanout - 1);
      for (const d of bus.devices) {
        link(m, d.inst, weight);
        if (d.xshut) link(splitPin(d.xshut)[0], d.inst, weight);
      }
    }
    const cw = cv.clientWidth || 900;
    const SP = 185;
    const placedX = {};
    let y = 100;
    const rows = [...byRow.keys()].sort((a, b) => a - b);
    rows.forEach((r, ri) => {
      let members = byRow.get(r);
      if (ri > 0) {
        // Weighted barycenter: sit each component under the connection-
        // weighted average x of whatever's already placed above it.
        members = members
          .map(inst => {
            let wsum = 0, xsum = 0;
            for (const [n, w] of adj.get(inst) || []) {
              if (placedX[n] === undefined) continue;
              wsum += w; xsum += w * placedX[n];
            }
            const bx = wsum > 0 ? xsum / wsum : cw / 2;
            return { inst, bx };
          })
          .sort((a, b) => a.bx - b.bx || (a.inst < b.inst ? -1 : 1))
          .map(o => o.inst);
      }
      let maxH = 60;
      for (const inst of members) maxH = Math.max(maxH, boxGeo(inst).h);
      members.forEach((inst, ci) => {
        const rot = (layout[inst] && layout[inst][2]) || 0;
        const x = cw / 2 + (ci - (members.length - 1) / 2) * SP;
        layout[inst] = [x, y + maxH / 2, rot];
        placedX[inst] = x;
      });
      y += maxH + 85;
    });
    saveLayout();
    draw();
  }

        if (e.target.value) net.signal = e.target.value; else delete net.signal;
        refresh();
      });
      div.querySelector(".del").addEventListener("click", e => { e.stopPropagation(); clearWireBend(net.id); nl.nets.splice(i, 1); selNet = -1; refresh(); });
      div.querySelector(".addpin").addEventListener("click", e => {
        e.stopPropagation();
        hint("pick a pin to add to " + net.id);
        pickHandler = pin => { if (!net.pins.includes(pin)) net.pins.push(pin); };
      });
      el.appendChild(div);
    });
  }

  function pinSelectBtn(current, onpick) {
    const b = document.createElement("button");
    b.className = "mini";
    b.textContent = current || "pick pin";
    b.addEventListener("click", () => {
      hint("pick a pin…");
      pickHandler = pin => { onpick(pin); };
    });
    return b;
  }

  function renderBuses() {
    const el = document.getElementById("buses");
    el.innerHTML = "";
    nl.buses.forEach((bus, bi) => {
      const div = document.createElement("div");
      div.className = "row";
      const hd = document.createElement("div");
      hd.className = "hd";
      hd.innerHTML = `<b>${bus.id}</b> (${bus.kind}) sda:${bus.sda} scl:${bus.scl} `;
      const del = document.createElement("button"); del.className = "mini"; del.textContent = "✕";
      del.addEventListener("click", () => { nl.buses.splice(bi, 1); refresh(); });
      hd.appendChild(del);
      div.appendChild(hd);
      bus.devices.forEach((dev, di) => {
        const d = document.createElement("div");
        d.className = "pins";
        d.innerHTML = `${dev.inst} @${dev.addr}` +
          (dev.reassign_to ? ` → ${dev.reassign_to}` : "") +
          (dev.xshut ? ` (xshut ${dev.xshut})` : "") + " ";
        const rm = document.createElement("button"); rm.className = "mini"; rm.textContent = "✕";
        rm.addEventListener("click", () => { bus.devices.splice(di, 1); refresh(); });
        d.appendChild(rm);
        div.appendChild(d);
      });
      const add = document.createElement("button");
      add.className = "mini"; add.textContent = "+ device";
      add.addEventListener("click", () => {

        if (!eligible.length) { alert("no bus-capable instances placed"); return; }
        const inst = prompt("instance (" + eligible.map(e => e[0]).join(", ") + "):", eligible[0][0]);
        if (!inst || !(inst in nl.instances)) return;
        const part = partById[nl.instances[inst]];
        const dev = { inst, addr: part?.elec?.bus?.default_addr || "0x00" };
        const re = prompt("reassign to address (blank = keep " + dev.addr + "):", "");
        if (re) dev.reassign_to = re;
        bus.devices.push(dev);
        if (re || part?.elec?.bus?.requires_xshut) {
          hint("pick the MCU pin driving " + inst + ".XSHUT");
          pickHandler = pin => { dev.xshut = pin; refresh(); };
        }

      });
      div.appendChild(add);
      el.appendChild(div);

    document.getElementById("addBus").onclick = () => {
      const bus = { id: "i2c" + nl.buses.length, kind: "i2c", sda: "", scl: "", devices: [] };

      hint("pick the SDA pin (an MCU i2c_sda-capable pin)");
      pickHandler = pin => {
        bus.sda = pin;

  function renderFailsafe() {
    const ta = document.getElementById("fsloss");
    ta.value = nl.failsafe.rx_loss || "";

    const b = document.createElement("button");
    b.className = "mini"; b.textContent = "+ stop pin";
    b.addEventListener("click", () => {
      hint("pick a stop pin (e.g. the ESC signal inputs)");
      pickHandler = pin => {
        if (!nl.failsafe.stop_pins.includes(pin)) nl.failsafe.stop_pins.push(pin);
      };

    el.appendChild(b);
    const clr = document.createElement("button");
    clr.className = "mini"; clr.textContent = "clear";
    clr.addEventListener("click", () => { nl.failsafe.stop_pins = []; refresh(); });

  let checkTimer = null;
  function runChecksSoon() {
    clearTimeout(checkTimer);
    checkTimer = setTimeout(() => {
      updateProse();
      const res = callChecks(nl);
      const verdict = document.getElementById("verdict");
      const el = document.getElementById("checks");
      if (res.error) {
        verdict.className = "bad";
        verdict.textContent = "SCHEMA: " + res.error;
        el.innerHTML = "";
        return;
      }
      const fails = res.checks.filter(c => !c.pass);
      verdict.className = fails.length ? "bad" : "ok";
      verdict.textContent = fails.length
        ? `E-CHECK FAILURES (${fails.length}) — do not solder`
        : "HARNESS LEGAL — all checks pass";
      el.innerHTML = res.checks.map(c => {
        const warn = c.pass && c.tier === "warn";
        const col = !c.pass ? "var(--bad)" : warn ? "var(--accent)" : "var(--ok)";
        const label = !c.pass ? "FAIL" : warn ? "WARN" : "PASS";
        const clickable = teachMode ? ' style="cursor:pointer"' : "";
        return `<div class="check" data-code="${c.code}"${clickable}><span class="pill" style="background:${col}">${label}</span>` +
          `<span>${c.code}</span><span class="d">${c.detail}</span></div>`;
      }).join("");
      // Teaching mode: any check row (not just the currently-loaded lesson's
      // own code) can be clicked to read its what/why/fix explanation —
      // rebuilt fresh each tick, same as the rest of this panel, since a
      // click here is a discrete action, not a gesture mid-drag (unlike the
      // run panel's sliders, nothing here needs identity preserved).
      if (teachMode) {
        el.querySelectorAll(".check").forEach(row => {
          row.addEventListener("click", () => {
            teachFocusCode = row.dataset.code;
            renderTeachPanel();
          });
        });
      }
    }, 250);
  }

  function refresh() {
    nameEl.value = nl.name;
    renderLayers();
    if (teachMode) renderTeachLessons(); else renderExamples();
    renderPalette();
    renderNets();
    renderBuses();
    renderFailsafe();
    renderSelInfo();
    renderTeachPanel();

    runChecksSoon();

// designer/10-io.js — import/export dialog elements
  const dlg = document.getElementById("ioDialog");
