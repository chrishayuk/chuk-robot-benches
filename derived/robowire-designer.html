<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>robowire designer</title>
<style>
  :root {
    --bg: #0d1114; --panel: #161c20; --panel2: #1d2429; --line: #2a3339;
    --ink: #e6e9e4; --dim: #8b969b; --accent: #e8a33d; --ok: #57b48f; --bad: #e05c50;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink); overflow: hidden;
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    display: grid; grid-template-columns: 240px 1fr 340px; grid-template-rows: 48px 1fr;
    grid-template-areas: "head head head" "left canvas right";
  }
  header {
    grid-area: head; display: flex; align-items: center; gap: 12px; padding: 0 14px;
    border-bottom: 1px solid var(--line); background: var(--panel);
  }
  header h1 {
    margin: 0; font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase;
    font-family: "Avenir Next Condensed", "Arial Narrow", sans-serif;
  }
  header input#nlname {
    background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
    border-radius: 4px; padding: 4px 8px; font-family: ui-monospace, Menlo, monospace; font-size: 12px;
    width: 220px;
  }
  header .spacer { flex: 1; }
  button {
    background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
    border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 12px;
    font-family: ui-monospace, Menlo, monospace;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #14100a; font-weight: 700; border-color: var(--accent); }
  button.mini { padding: 1px 7px; font-size: 10px; }
  #left { grid-area: left; border-right: 1px solid var(--line); overflow-y: auto; padding: 10px; background: var(--panel); }
  #right { grid-area: right; border-left: 1px solid var(--line); overflow-y: auto; padding: 10px; background: var(--panel); }
  #board { grid-area: canvas; display: block; width: 100%; height: 100%; cursor: default; }
  h2 {
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim);
    font-family: "Avenir Next Condensed", "Arial Narrow", sans-serif; margin: 12px 0 6px;
  }
  .part {
    display: flex; justify-content: space-between; align-items: center; gap: 6px;
    padding: 5px 7px; border: 1px solid var(--line); border-radius: 4px; margin-bottom: 5px;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
  }
  .part .k { color: var(--dim); font-size: 9px; }
  .row {
    border: 1px solid var(--line); border-radius: 4px; padding: 6px 8px; margin-bottom: 6px;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
  }
  .row.sel { border-color: var(--accent); }
  .row .hd { display: flex; gap: 6px; align-items: center; }
  .row input, .row select {
    background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
    border-radius: 3px; padding: 2px 5px; font-family: inherit; font-size: 11px;
  }
  .row input.id { width: 88px; }
  .row input.volts { width: 48px; }
  .row .pins { color: var(--dim); margin-top: 4px; overflow-wrap: anywhere; }
  .check { display: flex; gap: 7px; align-items: baseline; padding: 3px 0; font-family: ui-monospace, Menlo, monospace; font-size: 11px; }
  .check .pill { font-weight: 700; padding: 0 6px; border-radius: 3px; font-size: 10px; color: #0d1114; flex-shrink: 0; }
  .check .d { color: var(--dim); }
  #selinfo {
    border: 1px solid var(--accent); border-radius: 6px; padding: 8px 10px; margin: 10px 0 4px;
  }
  #selinfo .about { font-size: 12.5px; line-height: 1.5; text-wrap: pretty; margin: 4px 0; }
  #selinfo .meta { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: var(--dim); overflow-wrap: anywhere; }
  #selinfo .chip { display: inline-block; font-size: 10px; letter-spacing: 0.1em; padding: 0 7px; border-radius: 3px; font-weight: 700; color: #0d1114; }
  #selinfo ul { margin: 5px 0 0; padding-left: 0; list-style: none; font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; }
  #selinfo li { margin-top: 3px; overflow-wrap: anywhere; }
  #verdict { font-family: ui-monospace, Menlo, monospace; font-weight: 700; padding: 6px 8px; border-radius: 4px; margin-bottom: 6px; }
  #verdict.ok { background: color-mix(in srgb, var(--ok) 22%, transparent); color: var(--ok); }
  #verdict.bad { background: color-mix(in srgb, var(--bad) 22%, transparent); color: var(--bad); }
  #hint { position: fixed; bottom: 10px; left: 254px; color: var(--dim); font-size: 11px;
    background: color-mix(in srgb, var(--panel) 85%, transparent); padding: 4px 10px; border-radius: 4px; }
  dialog {
    background: var(--panel); color: var(--ink); border: 1px solid var(--line); border-radius: 8px;
    max-width: 640px; width: 80vw;
  }
  dialog::backdrop { background: rgba(0,0,0,0.6); }
  dialog textarea { width: 100%; height: 300px; background: var(--panel2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px; font: 11px ui-monospace, Menlo, monospace; }
  textarea#fsloss { width: 100%; height: 54px; background: var(--panel2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px; font: 11px ui-monospace, Menlo, monospace; }
  label.ck { display: flex; gap: 6px; align-items: center; font-size: 11px; font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
<header>
  <h1>robowire <span style="color:var(--accent)">designer</span></h1>
  <input id="nlname" title="netlist name">
  <span class="spacer"></span>
  <button id="modeBtn">3D view</button>
  <button id="importBtn">import</button>
  <button id="exportBtn" class="primary">export netlist</button>
</header>
<div id="left">
  <h2>layers</h2>
  <div id="layerToggles"></div>
  <h2>parts catalogue — drag onto the board</h2>
  <input id="partFilter" placeholder="filter parts…" style="width:100%;margin-bottom:6px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:4px;padding:4px 8px;font:11px ui-monospace,Menlo,monospace">
  <div id="palette"></div>
</div>
<canvas id="board"></canvas>
<div id="right">
  <div id="verdict"></div>
  <div id="checks"></div>
  <div id="selinfo" style="display:none"></div>
  <h2>nets — click a pin, then another, to wire</h2>
  <div id="nets"></div>
  <h2>i2c buses</h2>
  <div id="buses"></div>
  <button id="addBus" class="mini">+ add bus</button>
  <h2>failsafe declaration (E41)</h2>
  <textarea id="fsloss" placeholder="what happens on radio loss…"></textarea>
  <div id="fspins" style="margin-top:4px"></div>
</div>
<div id="hint"></div>
<dialog id="ioDialog">
  <h2 id="ioTitle">netlist json</h2>
  <textarea id="ioText"></textarea>
  <div style="display:flex; gap:8px; margin-top:8px">
    <button id="ioApply" class="primary">apply</button>
    <button id="ioDownload">download file</button>
    <button id="ioClose">close</button>
  </div>
</dialog>

[{"description":"The motor controller (ESC). It turns the brain's throttle commands into switched battery power for the two drive motors, and its built-in 5V regulator (the BEC) powers the brain and radio.","elec":{"pins":{"BEC5V":{"max_a":1.0,"role":"power_out","volts":5.0},"GND":{"required":true,"role":"gnd"},"M1+":{"channel":"M1","role":"motor_out"},"M1-":{"channel":"M1","role":"motor_out"},"M2+":{"channel":"M2","role":"motor_out"},"M2-":{"channel":"M2","role":"motor_out"},"S1":{"required":true,"role":"signal_in","signal":"pwm"},"S2":{"required":true,"role":"signal_in","signal":"pwm"},"VIN":{"required":true,"role":"power_in","v_range":[6.0,9.0]}}},"id":"bbb-dual-esc","kind":"esc","mass_g":5.0,"notes":"dual brushed ESC with 5V BEC","provisional":true},{"description":"An active buzzer: give it 5V and it screams — the classic 'robot is alive / battery is dying' indicator. Polarity matters.","elec":{"pins":{"+":{"required":true,"role":"power_in","v_range":[3.0,5.5]},"-":{"required":true,"role":"gnd"}}},"id":"buzzer-active-5v","kind":"buzzer","mass_g":1.5,"notes":"active piezo, ~30mA","provisional":true},{"description":"The radio receiver. It picks up the driver's transmitter and streams stick positions to the brain; when the link dies, it is the first domino in the failsafe chain.","elec":{"pins":{"GND":{"required":true,"role":"gnd"},"TX":{"required":true,"role":"signal_out","signal":"uart"},"VIN":{"required":true,"role":"power_in","v_range":[4.5,5.5]}}},"id":"elrs-rx","kind":"radio","mass_g":1.0,"notes":"ELRS receiver, CRSF out","provisional":true},{"description":"Not a real component — a budgeted mass allowance for the wiring loom itself, until robowire derives the true figure from wire gauges and lengths.","id":"harness-allowance","kind":"wiring","mass_g":4.0,"notes":"authored allowance until robowire M1 derives wiring mass from gauge x length","provisional":true},{"description":"The motion sensor. It measures acceleration and rotation so the brain knows how the r   const enc = new TextEncoder(), dec = new TextDecoder();
  function callChecks(netlistObj) {

    const p1 = W.wasm_alloc(nl.length), p2 = W.wasm_alloc(ps.length);
    new Uint8Array(W.memory.buffer, p1, nl.length).set(nl);
    new Uint8Array(W.memory.buffer, p2, ps.length).set(ps);

    return JSON.parse(dec.decode(out));

  // ---- model ---------------------------------------------------------------
  const partById = {};

    for (const p of pts) {
      const q = project3(p);
      if (!q) { started = false; continue; }
      if (!started) { cx.moveTo(q[0], q[1]); started = true; }
      else cx.lineTo(q[0], q[1]);
    }
    cx.strokeStyle = color; cx.lineWidth = width;
    cx.setLineDash(dashed ? [6, 5] : []);
    if (glow) { cx.shadowColor = color; cx.shadowBlur = 9; }
    cx.stroke();
    cx.shadowBlur = 0; cx.setLineDash([]);
  }
  function draw3() {
    pc = planeCenter();
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx.clearRect(0, 0, cv.clientWidth, cv.clientHeight);
    // floor grid around the plane centre
    for (let g = -300; g <= 300; g += 60) {
      stroke3([[pc[0] + g, pc[1] - 300, 0], [pc[0] + g, pc[1] + 300, 0]], "#151b20", 1, false, false);
      stroke3([[pc[0] - 300, pc[1] + g, 0], [pc[0] + 300, pc[1] + g, 0]], "#151b20", 1, false, false);
    }
    // wires (arcs, lifted — height separation is the point of this view)
    nl.nets.forEach((net, i) => {
      const cls = netClass(net);
      if (!layerOn[cls]) return;
      const col = COLORS[cls] || "#999";
      const selW = i === selNet;
      for (const arc of netArcs3(net, i)) stroke3(arc, col, selW ? 3 : 1.8, false, true);
    });
    for (const bus of (layerOn.i2c ? nl.buses : [])) {
      const m = pin3(bus.sda);
      if (!m) continue;
      for (const dev of bus.devices) {
        const d = pin3(dev.inst + ".SDA");
        if (d) stroke3(arc3(m, d, 44), COLORS.i2c, 1.8, true, true);
      }
    }
    // boxes
    for (const inst of Object.keys(nl.instances)) {
      if (!instVisible(inst)) continue;
      const g = geo3(inst);
      const isSel = inst === selInst;
      const col = isSel || (pending && splitPin(pending)[0] === inst) ? "#e8a33d" : "#5b6a73";
      const c = [];
      for (const sx of [-1, 1]) for (const sy of [-1, 1]) for (const sz of [0, 1])
        c.push([g.x + sx * g.W / 2, g.y + sy * g.D / 2, sz * g.h]);
      const edges = [[0,1],[2,3],[4,5],[6,7],[0,2],[1,3],[4,6],[5,7],[0,4],[1,5],[2,6],[3,7]];
      for (const [a, b] of edges) stroke3([c[a], c[b]], col, isSel ? 2 : 1.2, false, false);
      const q = project3([g.x, g.y, g.h + 10]);
      if (q) {
        cx.fillStyle = isSel ? "#e8a33d" : "#c7ced2";
        cx.font = "11px ui-monospace, Menlo, monospace";
        cx.fillText(inst, q[0] - 12, q[1]);
      }
      for (const [pin, pp] of Object.entries(g.pinPos3)) {
        const ep = inst + "." + pin;
        const q2 = project3(pp);
        if (!q2) continue;
        const active = pending === ep;
        cx.fillStyle = active ? "#e8a33d" : "#aab4ba";
        cx.beginPath(); cx.arc(q2[0], q2[1], active ? 5 : 3, 0, Math.PI * 2); cx.fill();
      }
    }
    if (wireDrag && wireDrag.moved) {
      const wp = pin3(wireDrag.from);
      const sp = wp && project3(wp);
      if (sp) {
        cx.strokeStyle = "#e8a33d"; cx.lineWidth = 1.6; cx.setLineDash([6, 4]);
        cx.beginPath(); cx.moveTo(sp[0], sp[1]); cx.lineTo(wireDrag.cur[0], wireDrag.cur[1]); cx.stroke();
        cx.setLineDash([]);
      }
    }
    hint(wireDrag && wireDrag.moved ? `release on a pin to connect ${wireDrag.from}` :
      pending ? `wiring from ${pending} — click another pin, or drag from a pin (esc cancels)` :
      pickHandler ? "pick a pin…" :
      "3D — drag empty space to orbit, wheel to zoom; switch to 2D to rearrange");
  }
  function roundRect(x, y, w, h, r) {
    cx.beginPath();
    cx.moveTo(x + r, y); cx.arcTo(x + w, y, x + w, y + h, r); cx.arcTo(x + w, y + h, x, y + h, r);
    cx.arcTo(x, y + h, x, y, r); cx.arcTo(x, y, x + w, y, r); cx.closePath();
  }
  function hint(t) { document.getElementById("hint").textContent = t; }

  // ---- interactions ----------------------------------------------------------
  function pinAt(mx, my) {
    for (const inst of Object.keys(nl.instances)) {
      if (!instVisible(inst)) continue;
      if (mode === "3d") {
        const g = geo3(inst);
        for (const [pin, pp] of Object.entries(g.pinPos3)) {
          const q = project3(pp);
          if (q && Math.hypot(mx - q[0], my - q[1]) < 8) return inst + "." + pin;
        }
      } else {
        const g = boxGeo(inst);
        for (const [pin, [px, py]] of Object.entries(g.pinPos)) {
          if (Math.hypot(mx - px, my - py) < 8) return inst + "." + pin;
        }
      }
    }
    return null;
  }
  function instAt(mx, my) {
    for (const inst of Object.keys(nl.instances).reverse()) {
      if (!instVisible(inst)) continue;
      if (mode === "3d") {
        const g = geo3(inst);
        const q = project3([g.x, g.y, g.h / 2]);
        if (q && Math.hypot(mx - q[0], my - q[1]) < 34) return inst;
      } else {
        const g = boxGeo(inst);
        if (Math.abs(mx - g.x) < BOXW / 2 && Math.abs(my - g.y) < g.h / 2) return inst;
      }
    }
    return null;
  }
  cv.addEventListener("pointerdown", e => {
    const mx = e.offsetX, my = e.offsetY;
    const pin = pinAt(mx, my);
    if (pin) {
      if (pickHandler) { const h = pickHandler; pickHandler = null; h(pin); refresh(); return; }
      // Press starts a potential drag-wire; release decides (drag onto a
      // pin to connect, or a plain click for the click-click flow).
      wireDrag = { from: pin, cur: [mx, my], moved: false };
      cv.setPointerCapture(e.pointerId);
      draw();
      return;
    }
    // removal badge on the selected box? (2D only; Delete works everywhere)
    if (mode === "2d" && selInst && layout[selInst]) {
      const g = boxGeo(selInst);
      if (Math.hypot(mx - (g.x + BOXW / 2 - 2), my - (g.y - g.h / 2 + 2)) < 10) {
        removeInstance(selInst);
        refresh(); return;
      }
    }
    const wi = wireAt(mx, my);
    if (wi >= 0) {
      selNet = wi; selInst = null;
      renderNets(); renderSelInfo(); draw();
      const row = document.querySelectorAll("#nets .row")[wi];
      if (row) row.scrollIntoView({ block: "nearest" });
      return;
    }
    const inst = instAt(mx, my);
    if (inst) {
      selInst = inst; selNet = -1;
      if (mode === "2d") {
        dragInst = inst; dragMoved = false;
        dragOff = [mx - layout[inst][0], my - layout[inst][1]];
        cv.setPointerCapture(e.pointerId);
      }
      renderNets(); renderSelInfo(); draw();
      return;
    }
    if (mode === "3d") {
      orbiting = true;
      lastXY = [mx, my];
      cv.classList.add("dragging");
      cv.setPointerCapture(e.pointerId);
      return;
    }
    pending = null; selInst = null; selNet = -1;
    renderNets(); renderSelInfo(); draw();
  });
  cv.addEventListener("pointermove", e => {
    if (wireDrag) {
      wireDrag.cur = [e.offsetX, e.offsetY];
      if (!wireDrag.moved) {
        const sp = mode === "3d" ? (pin3(wireDrag.from) && project3(pin3(wireDrag.from))) : pinXY(wireDrag.from);
        if (sp && Math.hypot(e.offsetX - sp[0], e.offsetY - sp[1]) > 7) wireDrag.moved = true;
      }
      draw();
      return;
    }
    if (orbiting) {
      yaw += (e.offsetX - lastXY[0]) * 0.008;
      pitch = Math.max(0.05, Math.min(1.45, pitch + (e.offsetY - lastXY[1]) * 0.006));
      lastXY = [e.offsetX, e.offsetY];
      draw();
      return;
    }
    if (dragInst) {
      dragMoved = true;
      layout[dragInst] = [e.offsetX - dragOff[0], e.offsetY - dragOff[1]];
      draw();
      return;
    }
    // cursor feedback
    const mx = e.offsetX, my = e.offsetY;
    cv.style.cursor = pinAt(mx, my) ? "crosshair"
      : wireAt(mx, my) >= 0 ? "pointer"
      : instAt(mx, my) ? "move" : "default";
  });
  cv.addEventListener("pointerup", e => {
    if (wireDrag) {
      const target = pinAt(e.offsetX, e.offsetY);
      if (wireDrag.moved && target && target !== wireDrag.from) {
        createNet(wireDrag.from, target);
        pending = null; wireDrag = null;
        refresh(); return;
      }
      if (!wireDrag.moved) {
        const pin = wireDrag.from;
        if (!pending) pending = pin;
        else if (pending !== pin) { createNet(pending, pin); pending = null; wireDrag = null; refresh(); return; }
        else pending = null;
      }
      wireDrag = null;
      draw(); return;
    }
    if (dragInst) { dragInst = null; saveLayout(); }
    if (orbiting) { orbiting = false; cv.classList.remove("dragging"); }
  });
  let lastXY = [0, 0];
  cv.addEventListener("wheel", e => {
    if (mode !== "3d") return;
    e.preventDefault();
    dist = Math.max(250, Math.min(2600, dist * (1 + e.deltaY * 0.001)));
    draw();
  }, { passive: false });
  document.getElementById("modeBtn").addEventListener("click", () => {
    mode = mode === "2d" ? "3d" : "2d";
    document.getElementById("modeBtn").textContent = mode === "2d" ? "3D view" : "2D view";
    pending = null;
    draw();
  });
  cv.addEventListener("dragover", e => {
    if (e.dataTransfer.types.includes("text/robowire-part")) {
      e.preventDefault();
      e.dataTransfer.dropEffect = "copy";
    }
  });
  cv.addEventListener("drop", e => {
    const partId = e.dataTransfer.getData("text/robowire-part");
    if (!partId) return;
    e.preventDefault();
    placeInstance(partId, e.offsetX, e.offsetY);
    refresh();
  });
  window.addEventListener("keydown", e => {
    const tag = document.activeElement && document.activeElement.tagName;
    if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
    if (e.key === "Escape") { pending = null; pickHandler = null; wireDrag = null; selInst = null; selNet = -1; renderNets(); renderSelInfo(); draw(); hint(""); }
    if ((e.key === "Delete" || e.key === "Backspace")) {
      if (selNet >= 0) { nl.nets.splice(selNet, 1); selNet = -1; refresh(); }
      else if (selInst) { removeInstance(selInst); refresh(); }
      e.preventDefault();
    }
  });
  function autoNetId(a, b) {
    const base = (splitPin(a)[1] + "_" + splitPin(b)[0]).toLowerCase().replace(/[^a-z0-9]+/g, "_");
    let id = base, k = 2;
    while (nl.nets.some(n => n.id === id)) id = base + "_" + k++;
    return id;
  }

  // ---- panels -----------------------------------------------------------------
  function placeInstance(partId, x, y) {
    const p = partById[partId];
    const short = { battery: "batt", switch: "sw", radio: "rx", mcu: "mcu", esc: "esc", imu: "imu", motor: "m", tof: "tof" };
    const base = short[p.kind] || p.kind;
    let cand = base, k = 2;
    while (cand in nl.instances) cand = base + "_" + k++;
    nl.instances[cand] = partId;
    if (x != null) layout[cand] = [x, y];
    saveLayout();
    selInst = cand; selNet = -1;
    return cand;
  }

  const PART_GROUPS = [
    ["power", ["battery", "switch"]],
    ["drive", ["esc", "motor"]],
    ["brain", ["mcu"]],
    ["sensors", ["tof", "imu"]],
    ["radio", ["radio"]],
    ["indicators & passives", ["led", "buzzer", "resistor", "button"]],
  ];
  function renderPalette() {
    const el = document.getElementById("palette");
    el.innerHTML = "";
    const q = (document.getElementById("partFilter").value || "").toLowerCase();
    const electrical = PARTS.filter(p => p.elec && Object.keys(p.elec.pins || {}).length);
    const grouped = new Set();
    const matches = p => !q || p.id.includes(q) || p.kind.includes(q) || (p.description || "").toLowerCase().includes(q);
    const renderGroup = (label, parts) => {
      if (!parts.length) return;
      const hd = document.createElement("div");
      hd.style.cssText = "color:var(--dim);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;margin:8px 0 3px";
      hd.textContent = label;
      el.appendChild(hd);
      for (const p of parts) renderCard(p);
    };
    for (const [label, kinds] of PART_GROUPS) {
      const parts = electrical.filter(p => kinds.includes(p.kind) && matches(p));
      parts.forEach(p => grouped.add(p.id));
      renderGroup(label, parts);
    }
    renderGroup("other", electrical.filter(p => !grouped.has(p.id) && matches(p)));
    function renderCard(p) {
      const div = document.createElement("div");
      div.className = "part";
      div.innerHTML = `<span>${p.id}<br><span class="k">${p.kind}</span></span>`;
      div.draggable = true;
      div.title = (p.description || "") + " — drag onto the board, or click + place";
      div.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/robowire-part", p.id);
        e.dataTransfer.effectAllowed = "copy";
      });
      const btn = document.createElement("button");
      btn.className = "mini"; btn.textContent = "+ place";
      btn.addEventListener("click", () => { placeInstance(p.id); refresh(); });
      div.appendChild(btn);
      el.appendChild(div);
    }
  }
  document.getElementById("partFilter").addEventListener("input", renderPalette);

  function renderNets() {
    const el = document.getElementById("nets");
    el.innerHTML = "";
    nl.nets.forEach((net, i) => {
      const div = document.createElement("div");
      div.className = "row" + (i === selNet ? " sel" : "");
      const col = COLORS[netClass(net)] || "#999";
      div.innerHTML =
        `<div class="hd"><span style="width:10px;height:10px;border-radius:2px;background:${col};display:inline-block"></span>` +
        `<input class="id" value="${net.id}"> V:<input class="volts" value="${net.volts ?? ""}" placeholder="—">` +
        ` sig:<select><option value="">—</option><option${net.signal === "pwm" ? " selected" : ""}>pwm</option><option${net.signal === "uart" ? " selected" : ""}>uart</option></select>` +
        ` <button class="mini del">✕</button></div>` +
        `<div class="pins">${net.pins.join(" · ")} <button class="mini addpin">+pin</button></div>`;
      div.addEventListener("click", () => { if (selNet !== i) { selNet = i; selInst = null; renderNets(); renderSelInfo(); draw(); } });
      div.querySelector(".id").addEventListener("change", e => { net.id = e.target.value; refresh(); });
      div.querySelector(".volts").addEventListener("change", e => {
        const v = parseFloat(e.target.value);
        if (isNaN(v)) delete net.volts; else net.volts = v;
        refresh();
      });
      div.querySelector("select").addEventListener("change", e => {
        if (e.target.value) net.signal = e.target.value; else delete net.signal;
        refresh();
      });
      div.querySelector(".del").addEventListener("click", e => { e.stopPropagation(); nl.nets.splice(i, 1); selNet = -1; refresh(); });
      div.querySelector(".addpin").addEventListener("click", e => {
        e.stopPropagation();
        hint("pick a pin to add to " + net.id);
        pickHandler = pin => { if (!net.pins.includes(pin)) net.pins.push(pin); };
      });
      el.appendChild(div);
    });
  }

  function pinSelectBtn(current, onpick) {
    const b = document.createElement("button");
    b.className = "mini";
    b.textContent = current || "pick pin";
    b.addEventListener("click", () => {
      hint("pick a pin…");
      pickHandler = pin => { onpick(pin); };
    });
    return b;
  }

  function renderBuses() {
    const el = document.getElementById("buses");
    el.innerHTML = "";
    nl.buses.forEach((bus, bi) => {
      const div = document.createElement("div");
      div.className = "row";
      const hd = document.createElement("div");
      hd.className = "hd";
      hd.innerHTML = `<b>${bus.id}</b> (${bus.kind}) sda:${bus.sda} scl:${bus.scl} `;
      const del = document.createElement("button"); del.className = "mini"; del.textContent = "✕";
      del.addEventListener("click", () => { nl.buses.splice(bi, 1); refresh(); });
      hd.appendChild(del);
      div.appendChild(hd);
      bus.devices.forEach((dev, di) => {
        const d = document.createElement("div");
        d.className = "pins";
        d.innerHTML = `${dev.inst} @${dev.addr}` +
          (dev.reassign_to ? ` → ${dev.reassign_to}` : "") +
          (dev.xshut ? ` (xshut ${dev.xshut})` : "") + " ";
        const rm = document.createElement("button"); rm.className = "mini"; rm.textContent = "✕";
        rm.addEventListener("click", () => { bus.devices.splice(di, 1); refresh(); });
        d.appendChild(rm);
        div.appendChild(d);
      });
      const add = document.createElement("button");
      add.className = "mini"; add.textContent = "+ device";
      add.addEventListener("click", () => {
        const eligible = Object.entries(nl.instances).filter(([, pid]) => partById[pid]?.elec?.bus);
        if (!eligible.length) { alert("no bus-capable instances placed"); return; }
        const inst = prompt("instance (" + eligible.map(e => e[0]).join(", ") + "):", eligible[0][0]);
        if (!inst || !(inst in nl.instances)) return;
        const part = partById[nl.instances[inst]];
        const dev = { inst, addr: part?.elec?.bus?.default_addr || "0x00" };
        const re = prompt("reassign to address (blank = keep " + dev.addr + "):", "");
        if (re) dev.reassign_to = re;
        bus.devices.push(dev);
        if (re || part?.elec?.bus?.requires_xshut) {
          hint("pick the MCU pin driving " + inst + ".XSHUT");
          pickHandler = pin => { dev.xshut = pin; refresh(); };
        }
        refresh();
      });
      div.appendChild(add);
      el.appendChild(div);
    });
    document.getElementById("addBus").onclick = () => {
      const bus = { id: "i2c" + nl.buses.length, kind: "i2c", sda: "", scl: "", devices: [] };
      nl.buses.push(bus);
      hint("pick the SDA pin (an MCU i2c_sda-capable pin)");
      pickHandler = pin => {
        bus.sda = pin;
        hint("pick the SCL pin");
        pickHandler = p2 => { bus.scl = p2; refresh(); };
        draw();
      };
      refresh();
    };
  }

  function renderFailsafe() {
    const ta = document.getElementById("fsloss");
    ta.value = nl.failsafe.rx_loss || "";
    ta.onchange = () => { nl.failsafe.rx_loss = ta.value; refresh(); };
    const el = document.getElementById("fspins");
    el.innerHTML = "stop pins: " + (nl.failsafe.stop_pins.join(" · ") || "—") + " ";
    const b = document.createElement("button");
    b.className = "mini"; b.textContent = "+ stop pin";
    b.addEventListener("click", () => {
      hint("pick a stop pin (e.g. the ESC signal inputs)");
      pickHandler = pin => {
        if (!nl.failsafe.stop_pins.includes(pin)) nl.failsafe.stop_pins.push(pin);
      };
    });
    el.appendChild(b);
    const clr = document.createElement("button");
    clr.className = "mini"; clr.textContent = "clear";
    clr.addEventListener("click", () => { nl.failsafe.stop_pins = []; refresh(); });
    el.appendChild(clr);
  }

  // ---- live checks --------------------------------------------------------------
  let checkTimer = null;
  function runChecksSoon() {
    clearTimeout(checkTimer);
    checkTimer = setTimeout(() => {
      const res = callChecks(nl);
      const verdict = document.getElementById("verdict");
      const el = document.getElementById("checks");
      if (res.error) {
        verdict.className = "bad";
        verdict.textContent = "SCHEMA: " + res.error;
        el.innerHTML = "";
        return;
      }
      const fails = res.checks.filter(c => !c.pass);
      verdict.className = fails.length ? "bad" : "ok";
      verdict.textContent = fails.length
        ? `E-CHECK FAILURES (${fails.length}) — do not solder`
        : "HARNESS LEGAL — all checks pass";
      el.innerHTML = res.checks.map(c => {
        const col = c.pass ? "var(--ok)" : "var(--bad)";
        return `<div class="check"><span class="pill" style="background:${col}">${c.pass ? "PASS" : "FAIL"}</span>` +
          `<span>${c.code}</span><span class="d">${c.detail}</span></div>`;
      }).join("");
    }, 250);
  }

  // ---- io -------------------------------------------------------------------------
  const dlg = document.getElementById("ioDialog");
  document.getElementById("exportBtn").addEventListener("click", () => {
    document.getElementById("ioTitle").textContent = "netlist json — canonical (layout not included)";
    document.getElementById("ioText").value = JSON.stringify(nl, null, 2);
    document.getElementById("ioApply").style.display = "none";
    dlg.showModal();
  });
  document.getElementById("importBtn").addEventListener("click", () => {
    document.getElementById("ioTitle").textContent = "paste netlist json";
    document.getElementById("ioText").value = "";
    document.getElementById("ioApply").style.display = "";
    dlg.showModal();
  });
  document.getElementById("ioApply").addEventListener("click", () => {
    try {
      nl = JSON.parse(document.getElementById("ioText").value);
      if (!nl.failsafe) nl.failsafe = { rx_loss: "", stop_pins: [] };
      if (!nl.buses) nl.buses = [];
      layout = {};
      try { layout = JSON.parse(localStorage.getItem(LAYOUT_KEY()) || "{}"); } catch {}
      dlg.close(); refresh();
    } catch (e) { alert("parse error: " + e.message); }
  });
  document.getElementById("ioDownload").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(nl, null, 2) + "\n"], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = nl.name + ".json";
    a.click();
  });
  document.getElementById("ioClose").addEventListener("click", () => dlg.close());
  const nameEl = document.getElementById("nlname");
  nameEl.addEventListener("change", () => { nl.name = nameEl.value; refresh(); });

  // ---- refresh --------------------------------------------------------------------
  function refresh() {
    nameEl.value = nl.name;
    renderLayers();
    renderPalette();
    renderNets();
    renderBuses();
    renderFailsafe();
    renderSelInfo();
    draw();
    runChecksSoon();
  }
  window.addEventListener("resize", resize);
  refresh();
  resize();
})();
</script>
</body>
</html>
