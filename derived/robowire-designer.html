<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>robowire designer</title>
<style>
  :root {
    --bg: #0d1114; --panel: #161c20; --panel2: #1d2429; --line: #2a3339;
    --ink: #e6e9e4; --dim: #8b969b; --accent: #e8a33d; --ok: #57b48f; --bad: #e05c50;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink); overflow: hidden;
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    display: grid; grid-template-columns: 240px 1fr 340px; grid-template-rows: 48px 1fr;
    grid-template-areas: "head head head" "left canvas right";
  }
  header {
    grid-area: head; display: flex; align-items: center; gap: 12px; padding: 0 14px;
    border-bottom: 1px solid var(--line); background: var(--panel);
  }
  header h1 {
    margin: 0; font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase;
    font-family: "Avenir Next Condensed", "Arial Narrow", sans-serif;
  }
  header input#nlname {
    background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
    border-radius: 4px; padding: 4px 8px; font-family: ui-monospace, Menlo, monospace; font-size: 12px;
    width: 220px;
  }
  header .spacer { flex: 1; }
  button {
    background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
    border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 12px;
    font-family: ui-monospace, Menlo, monospace;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #14100a; font-weight: 700; border-color: var(--accent); }
  button.mini { padding: 1px 7px; font-size: 10px; }
  #left { grid-area: left; border-right: 1px solid var(--line); overflow-y: auto; padding: 10px; background: var(--panel); }
  #right { grid-area: right; border-left: 1px solid var(--line); overflow-y: auto; padding: 10px; background: var(--panel); }
  #board { grid-area: canvas; display: block; width: 100%; height: 100%; cursor: default; }
  h2 {
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim);
    font-family: "Avenir Next Condensed", "Arial Narrow", sans-serif; margin: 12px 0 6px;
  }
  .part {
    display: flex; justify-content: space-between; align-items: center; gap: 6px;
    padding: 5px 7px; border: 1px solid var(--line); border-radius: 4px; margin-bottom: 5px;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
  }
  .part .k { color: var(--dim); font-size: 9px; }
  .row {
    border: 1px solid var(--line); border-radius: 4px; padding: 6px 8px; margin-bottom: 6px;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
  }
  .row.sel { border-color: var(--accent); }
  .row .hd { display: flex; gap: 6px; align-items: center; }
  .row input, .row select {
    background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
    border-radius: 3px; padding: 2px 5px; font-family: inherit; font-size: 11px;
  }
  .row input.id { width: 88px; }
  .row input.volts { width: 48px; }
  .row .pins { color: var(--dim); margin-top: 4px; overflow-wrap: anywhere; }
  .runrow input[type=range] { width: 170px; vertical-align: middle; }
  .runrow input[type=number] { width: 64px; }
  .runrow .runToggle { min-width: 34px; }
  .check { display: flex; gap: 7px; align-items: baseline; padding: 3px 0; font-family: ui-monospace, Menlo, monospace; font-size: 11px; }
  .check .pill { font-weight: 700; padding: 0 6px; border-radius: 3px; font-size: 10px; color: #0d1114; flex-shrink: 0; }
  .check .d { color: var(--dim); }
  #selinfo {
    border: 1px solid var(--accent); border-radius: 6px; padding: 8px 10px; margin: 10px 0 4px;
  }
  #selinfo .about { font-size: 12.5px; line-height: 1.5; text-wrap: pretty; margin: 4px 0; }
  #selinfo .meta { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: var(--dim); overflow-wrap: anywhere; }
  #selinfo .chip { display: inline-block; font-size: 10px; letter-spacing: 0.1em; padding: 0 7px; border-radius: 3px; font-weight: 700; color: #0d1114; }
  #selinfo ul { margin: 5px 0 0; padding-left: 0; list-style: none; font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; }
  #selinfo li { margin-top: 3px; overflow-wrap: anywhere; }
  #verdict { font-family: ui-monospace, Menlo, monospace; font-weight: 700; padding: 6px 8px; border-radius: 4px; margin-bottom: 6px; }
  #verdict.ok { background: color-mix(in srgb, var(--ok) 22%, transparent); color: var(--ok); }
  #verdict.bad { background: color-mix(in srgb, var(--bad) 22%, transparent); color: var(--bad); }
  #hint { position: fixed; bottom: 10px; left: 254px; color: var(--dim); font-size: 11px;
    background: color-mix(in srgb, var(--panel) 85%, transparent); padding: 4px 10px; border-radius: 4px; }
  dialog {
    background: var(--panel); color: var(--ink); border: 1px solid var(--line); border-radius: 8px;
    max-width: 640px; width: 80vw;
  }
  dialog::backdrop { background: rgba(0,0,0,0.6); }
  dialog textarea { width: 100%; height: 300px; background: var(--panel2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px; font: 11px ui-monospace, Menlo, monospace; }
  textarea#fsloss { width: 100%; height: 54px; background: var(--panel2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px; font: 11px ui-monospace, Menlo, monospace; }
  label.ck { display: flex; gap: 6px; align-items: center; font-size: 11px; font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
<header>
  <h1>robowire <span style="color:var(--accent)">designer</span></h1>
  <input id="nlname" title="netlist name">
  <span class="spacer"></span>
  <button id="modeBtn">3D view</button>
  <button id="arrangeBtn">auto-arrange</button>
  <button id="importBtn">import</button>
  <button id="exportBtn" class="primary">export netlist</button>
  <button id="runBtn">run mode</button>
</header>
<div id="left">
  <h2>layers</h2>
  <div id="layerToggles"></div>
  <h2>examples — click to load</h2>
  <div id="examples"></div>
  <h2>parts catalogue — drag onto the board</h2>
  <input id="partFilter" placeholder="filter parts…" style="width:100%;margin-bottom:6px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:4px;padding:4px 8px;font:11px ui-monospace,Menlo,monospace">
  <div id="palette"></div>
</div>
<canvas id="board"></canvas>
<div id="right">
  <div id="runPanel" style="display:none"></div>
  <div id="verdict"></div>
  <div id="checks"></div>
  <div id="selinfo" style="display:none"></div>
  <h2>nets — click a pin, then another, to wire</h2>
  <div id="nets"></div>
  <h2>i2c buses</h2>
  <div id="buses"></div>
  <button id="addBus" class="mini">+ add bus</button>
  <h2>failsafe declaration (E41)</h2>
  <textarea id="fsloss" placeholder="what happens on radio loss…"></textarea>
  <div id="fspins" style="margin-top:4px"></div>
</div>
<div id="hint"></div>
<div id="dbg" style="position:fixed;bottom:10px;right:14px;color:var(--dim);font:10px ui-monospace,Menlo,monospace;background:color-mix(in srgb, var(--panel) 85%, transparent);padding:3px 8px;border-radius:4px">build 19922ecf</div>
<dialog id="ioDialog">
  <h2 id="ioTitle">netlist json</h2>
  <textarea id="ioText"></textarea>
  <div style="display:flex; gap:8px; margin-top:8px">
    <button id="ioApply" class="primary">apply</button>
    <button id="ioDownload">download file</button>
    <button id="ioClose">close</button>
  </div>
</dialog>

        cx.font = "bold 9px ui-monospace, Menlo, monospace";
        for (const ep of net.pins) {
          const q = pinXY(ep);
          if (!q) continue;
          const lx = q[0] + (q[2] || 0) * (STUB + 6), ly = q[1] + (q[3] || 0) * (STUB + 6);
          cx.fillStyle = "#0d1114";
          const wdt = cx.measureText(ep).width;
          cx.fillRect(lx - (q[2] < 0 ? wdt : 0) - 2, ly - 8, wdt + 4, 11);
          cx.fillStyle = col;
          cx.textAlign = q[2] < 0 ? "right" : "left";
          cx.fillText(ep, lx, ly);
          cx.textAlign = "left";
        }
      }
    });
    // bus wires
    for (const bus of (layerOn.i2c ? nl.buses : [])) {
      const m = pinXY(bus.sda);
      if (!m) continue;
      for (const dev of bus.devices) {
        const dpin = pinXY(dev.inst + ".SDA");
        if (!dpin) continue;
        cx.strokeStyle = COLORS.i2c; cx.lineWidth = 1.8; cx.setLineDash([7, 4]);
        cx.beginPath();
        cx.moveTo(m[0], m[1]);
        cx.bezierCurveTo(
          m[0] + (m[2] || 0) * 50, m[1] + (m[3] || 0) * 50,
          dpin[0] + (dpin[2] || 0) * 50, dpin[1] + (dpin[3] || 0) * 50,
          dpin[0], dpin[1]);
        cx.stroke(); cx.setLineDash([]);
      }
    }

    // 3) pins — always-on-top plugs (colored = wired, hollow = free)
    for (const inst of Object.keys(nl.instances)) {
      if (!instVisible(inst)) continue;
      const g = boxGeo(inst);
      for (const [pin, [px, py, ox, oy]] of Object.entries(g.pinPos)) {
        const ep = inst + "." + pin;
        const active = pending === ep;
        const wired = pinColors[ep];
        if (active) {
          cx.fillStyle = "#e8a33d";
          cx.beginPath(); cx.arc(px, py, 5, 0, Math.PI * 2); cx.fill();
        } else if (wired) {
          cx.fillStyle = wired;
          cx.beginPath(); cx.arc(px, py, 4, 0, Math.PI * 2); cx.fill();
        } else {
          cx.strokeStyle = "#6b787f"; cx.lineWidth = 1.2;
          cx.beginPath(); cx.arc(px, py, 3, 0, Math.PI * 2); cx.stroke();
        }
        cx.fillStyle = "#8b969b";
        cx.font = "8.5px ui-monospace, Menlo, monospace";
        cx.textAlign = ox < -0.3 ? "right" : ox > 0.3 ? "left" : "center";
        cx.fillText(pin, px + ox * 9, py + oy * 9 + 3);
        cx.textAlign = "left";
      }
    }

    if (wireDrag && wireDrag.moved) {
      const sp = pinXY(wireDrag.from);
      if (sp) {
        cx.strokeStyle = "#e8a33d"; cx.lineWidth = 1.6; cx.setLineDash([6, 4]);
        cx.beginPath(); cx.moveTo(sp[0], sp[1]); cx.lineTo(wireDrag.cur[0], wireDrag.cur[1]); cx.stroke();
        cx.setLineDash([]);
      }
    }
    hint(wireDrag && wireDrag.moved ? `release on a pin to connect ${wireDrag.from}` :
      dragWireNet != null ? "dragging wire bend — release to drop, double-click it to straighten" :
      pending ? `wiring from ${pending} — click another pin, or drag from a pin (esc cancels)` :
      pickHandler ? "pick a pin…" :
      selInst ? `${selInst} selected — drag to move, R rotates, ✕ or Delete removes` :
      selNet >= 0 ? "net selected — drag its path to bend it, double-click to straighten, Delete removes it" : "");
  }
  function roundRect(x, y, w, h, r) {
    cx.beginPath();
    cx.moveTo(x + r, y); cx.arcTo(x + w, y, x + w, y + h, r); cx.arcTo(x + w, y + h, x, y + h, r);
    cx.arcTo(x, y + h, x, y, r); cx.arcTo(x, y, x + w, y, r); cx.closePath();
  }

// designer/08-render3d.js — 3D renderer
  function stroke3(pts, color, width, dashed, glow) {
    cx.beginPath();
    let started = false;
    for (const pt of pts) {
      const q = project3(pt);
      if (!q) { started = false; continue; }
      if (!started) { cx.moveTo(q[0], q[1]); started = true; }
      else cx.lineTo(q[0], q[1]);
    }
    cx.strokeStyle = color; cx.lineWidth = width;
    cx.setLineDash(dashed ? [6, 5] : []);
    if (glow) { cx.shadowColor = color; cx.shadowBlur = 9; }
    cx.stroke();
    cx.shadowBlur = 0; cx.setLineDash([]);
  }
  function draw3() {
    pc = planeCenter();
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx.clearRect(0, 0, cv.clientWidth, cv.clientHeight);
    for (let g = -300; g <= 300; g += 60) {
      stroke3([[pc[0] + g, pc[1] - 300, 0], [pc[0] + g, pc[1] + 300, 0]], "#151b20", 1, false, false);
      stroke3([[pc[0] - 300, pc[1] + g, 0], [pc[0] + 300, pc[1] + g, 0]], "#151b20", 1, false, false);
    }
    nl.nets.forEach((net, i) => {
      const cls = netClass(net);
      if (!layerOn[cls]) return;
      let col = COLORS[cls] || "#999";
      let flowing = false;
      if (runMode) {
        const ns = runState.nets && runState.nets[net.id];
        flowing = !!(ns && ns.amps > 0.001);
        if (flowing) col = "#57b48f"; // green — current is actually flowing here
      }
      const selW = i === selNet;
      if (flowing) cx.lineDashOffset = -spinPhase * 14;
      for (const arc of netArcs3(net, i)) stroke3(arc, col, selW ? 3 : 1.8, flowing, true);
      if (!runMode) {
        const bend = net.pins.length === 2 ? wireBendOf(net.id) : null;
        if (bend) {
          const ends = net.pins.map(pin3).filter(Boolean);
          const z = bend[2] != null ? bend[2] : defaultWireLift3(net, i, ends);
          const q = project3([bend[0], bend[1], z]);
          if (q) {
            const s = i === selNet || dragWireNet === i ? 5 : 3.6;
            cx.fillStyle = i === selNet || dragWireNet === i ? "#e8a33d" : col;
            cx.beginPath();
            cx.moveTo(q[0], q[1] - s); cx.lineTo(q[0] + s, q[1]);
            cx.lineTo(q[0], q[1] + s); cx.lineTo(q[0] - s, q[1]);
            cx.closePath(); cx.fill();
          }
        }
      }
    });
    for (const bus of (layerOn.i2c ? nl.buses : [])) {
      const m = pin3(bus.sda);
      if (!m) continue;
      for (const dev of bus.devices) {
        const d = pin3(dev.inst + ".SDA");
        if (d) stroke3(arc3(m, d, CLASS_LIFT.i2c), COLORS.i2c, 1.8, true, true);
      }
    }
    const pinColors3 = computePinColors();
    for (const inst of Object.keys(nl.instances)) {
      if (!instVisible(inst)) continue;
      const g = geo3(inst);
      const isSel = inst === selInst;
      const col = isSel || (pending && splitPin(pending)[0] === inst) ? "#e8a33d" : "#5b6a73";
      const c = [];
      for (const sx of [-1, 1]) for (const sy of [-1, 1]) for (const sz of [0, 1])
        c.push([g.x + sx * g.W / 2, g.y + sy * g.D / 2, sz * g.h]);
      const edges = [[0,1],[2,3],[4,5],[6,7],[0,2],[1,3],[4,6],[5,7],[0,4],[1,5],[2,6],[3,7]];
      for (const [a, b] of edges) stroke3([c[a], c[b]], col, isSel ? 2 : 1.2, false, false);
      const q = project3([g.x, g.y, g.h + 10]);
      if (q) {
        cx.fillStyle = isSel ? "#e8a33d" : "#c7ced2";
        cx.font = "11px ui-monospace, Menlo, monospace";
        cx.fillText(inst, q[0] - 12, q[1]);
      }
      for (const [pin, pp] of Object.entries(g.pinPos3)) {
        const ep = inst + "." + pin;
        const q2 = project3(pp);
        if (!q2) continue;
        const active = pending === ep;
        const wired = pinColors3[ep];
        if (active) {
          cx.fillStyle = "#e8a33d";
          cx.beginPath(); cx.arc(q2[0], q2[1], 5, 0, Math.PI * 2); cx.fill();
        } else if (wired) {
          cx.fillStyle = wired;
          cx.beginPath(); cx.arc(q2[0], q2[1], 3.6, 0, Math.PI * 2); cx.fill();
        } else {
          cx.strokeStyle = "#6b787f"; cx.lineWidth = 1;
          cx.beginPath(); cx.arc(q2[0], q2[1], 2.8, 0, Math.PI * 2); cx.stroke();
        }
      }
      if (runMode) {
        const bq = project3([g.x, g.y, g.h / 2]);
        if (bq) drawRunOverlay3d(inst, bq);
      }
    }
    if (wireDrag && wireDrag.moved) {
      const wp = pin3(wireDrag.from);
      const sp = wp && project3(wp);
      if (sp) {
        cx.strokeStyle = "#e8a33d"; cx.lineWidth = 1.6; cx.setLineDash([6, 4]);
        cx.beginPath(); cx.moveTo(sp[0], sp[1]); cx.lineTo(wireDrag.cur[0], wireDrag.cur[1]); cx.stroke();
        cx.setLineDash([]);
      }
    }
    hint(wireDrag && wireDrag.moved ? `release on a pin to connect ${wireDrag.from}` :
      pending ? `wiring from ${pending} — click another pin, or drag from a pin (esc cancels)` :
      pickHandler ? "pick a pin…" :
      "3D — drag empty space to orbit, wheel to zoom; switch to 2D to rearrange");
  }

  const ARRANGE_ROWS = [
    ["battery", "switch", "regulator"],
    ["esc", "motor"],
    ["mcu"],
    ["tof", "imu", "radio"],
    ["led", "resistor", "potentiometer", "buzzer", "button"],
  ];
  function autoArrange() {
    const insts = Object.keys(nl.instances);
    if (!insts.length) return;
    const rowOf = inst => {
      const k = kindOf(inst);
      const idx = ARRANGE_ROWS.findIndex(r => r.includes(k));
      return idx >= 0 ? idx : ARRANGE_ROWS.length;
    };
    const byRow = new Map();
    for (const inst of insts.sort()) {
      const r = rowOf(inst);
      if (!byRow.has(r)) byRow.set(r, []);
      byRow.get(r).push(inst);
    }
    // Connectivity graph, weighted per net by 1/(members-1): a net with many
    // members (ground, most often) touches almost everything, so its pull on
    // any ONE neighbor is diffuse and shouldn't dominate — letting it do so
    // is exactly what turns into a long diagonal wire crossing unrelated
    // boxes. A net with just two members (the common case: one specific
    // rail between exactly these two parts) pulls at full strength, since
    // THAT connection is the one actually worth keeping short and aligned.
    const adj = new Map(insts.map(i => [i, new Map()]));
    const link = (a, b, weight) => {
      if (a === b || !adj.has(a) || !adj.has(b)) return;
      adj.get(a).set(b, (adj.get(a).get(b) || 0) + weight);
      adj.get(b).set(a, (adj.get(b).get(a) || 0) + weight);
    };
    for (const net of nl.nets) {
      const is = [...new Set(net.pins.map(pn => splitPin(pn)[0]))];
      const weight = 1 / Math.max(1, is.length - 1);
      for (let i = 0; i < is.length; i++) for (let j = i + 1; j < is.length; j++) link(is[i], is[j], weight);
    }
    for (const bus of nl.buses) {
      const m = splitPin(bus.sda)[0];
      const fanout = 1 + bus.devices.length;
      const weight = 1 / Math.max(1, fanout - 1);
      for (const d of bus.devices) {
        link(m, d.inst, weight);
        if (d.xshut) link(splitPin(d.xshut)[0], d.inst, weight);
      }
    }
    const cw = cv.clientWidth || 900;
    const SP = 185;
    const placedX = {};
    let y = 100;
    const rows = [...byRow.keys()].sort((a, b) => a - b);
    rows.forEach((r, ri) => {
      let members = byRow.get(r);
      if (ri > 0) {
        // Weighted barycenter: sit each component under the connection-
        // weighted average x of whatever's already placed above it.
        members = members
          .map(inst => {
            let wsum = 0, xsum = 0;
            for (const [n, w] of adj.get(inst) || []) {
              if (placedX[n] === undefined) continue;
              wsum += w; xsum += w * placedX[n];
            }
            const bx = wsum > 0 ? xsum / wsum : cw / 2;
            return { inst, bx };
          })
          .sort((a, b) => a.bx - b.bx || (a.inst < b.inst ? -1 : 1))
          .map(o => o.inst);
      }
      let maxH = 60;
      for (const inst of members) maxH = Math.max(maxH, boxGeo(inst).h);
      members.forEach((inst, ci) => {
        const rot = (layout[inst] && layout[inst][2]) || 0;
        const x = cw / 2 + (ci - (members.length - 1) / 2) * SP;
        layout[inst] = [x, y + maxH / 2, rot];
        placedX[inst] = x;
      });
      y += maxH + 85;
    });
    saveLayout();
    draw();
  }

      div.querySelector(".del").addEventListener("click", e => { e.stopPropagation(); clearWireBend(net.id); nl.nets.splice(i, 1); selNet = -1; refresh(); });
      div.querySelector(".addpin").addEventListener("click", e => {
        e.stopPropagation();
        hint("pick a pin to add to " + net.id);
        pickHandler = pin => { if (!net.pins.includes(pin)) net.pins.push(pin); };
      });
      el.appendChild(div);
    });
  }

  function pinSelectBtn(current, onpick) {
    const b = document.createElement("button");
    b.className = "mini";
    b.textContent = current || "pick pin";
    b.addEventListener("click", () => {
      hint("pick a pin…");
      pickHandler = pin => { onpick(pin); };
    });
    return b;
  }

  function renderBuses() {
    const el = document.getElementById("buses");
    el.innerHTML = "";
    nl.buses.forEach((bus, bi) => {
      const div = document.createElement("div");
      div.className = "row";
      const hd = document.createElement("div");
      hd.className = "hd";
      hd.innerHTML = `<b>${bus.id}</b> (${bus.kind}) sda:${bus.sda} scl:${bus.scl} `;
      const del = document.createElement("button"); del.className = "mini"; del.textContent = "✕";
      del.addEventListener("click", () => { nl.buses.splice(bi, 1); refresh(); });
      hd.appendChild(del);
      div.appendChild(hd);
      bus.devices.forEach((dev, di) => {
        const d = document.createElement("div");
        d.className = "pins";
        d.innerHTML = `${dev.inst} @${dev.addr}` +
          (dev.reassign_to ? ` → ${dev.reassign_to}` : "") +
          (dev.xshut ? ` (xshut ${dev.xshut})` : "") + " ";
        const rm = document.createElement("button"); rm.className = "mini"; rm.textContent = "✕";
        rm.addEventListener("click", () => { bus.devices.splice(di, 1); refresh(); });
        d.appendChild(rm);
        div.appendChild(d);
      });
      const add = document.createElement("button");
      add.className = "mini"; add.textContent = "+ device";
      add.addEventListener("click", () => {
        const eligible = Object.entries(nl.instances).filter(([, pid]) => partById[pid]?.elec?.bus);
        if (!eligible.length) { alert("no bus-capable instances placed"); return; }
        const inst = prompt("instance (" + eligible.map(e => e[0]).join(", ") + "):", eligible[0][0]);
        if (!inst || !(inst in nl.instances)) return;
        const part = partById[nl.instances[inst]];
        const dev = { inst, addr: part?.elec?.bus?.default_addr || "0x00" };
        const re = prompt("reassign to address (blank = keep " + dev.addr + "):", "");
        if (re) dev.reassign_to = re;
        bus.devices.push(dev);
        if (re || part?.elec?.bus?.requires_xshut) {
          hint("pick the MCU pin driving " + inst + ".XSHUT");
          pickHandler = pin => { dev.xshut = pin; refresh(); };
        }
        refresh();
      });
      div.appendChild(add);
      el.appendChild(div);
    });
    document.getElementById("addBus").onclick = () => {
      const bus = { id: "i2c" + nl.buses.length, kind: "i2c", sda: "", scl: "", devices: [] };
      nl.buses.push(bus);
      hint("pick the SDA pin (an MCU i2c_sda-capable pin)");
      pickHandler = pin => {
        bus.sda = pin;
        hint("pick the SCL pin");
        pickHandler = p2 => { bus.scl = p2; refresh(); };
        draw();
      };
      refresh();
    };
  }

  function renderFailsafe() {
    const ta = document.getElementById("fsloss");
    ta.value = nl.failsafe.rx_loss || "";
    ta.onchange = () => { nl.failsafe.rx_loss = ta.value; refresh(); };
    const el = document.getElementById("fspins");
    el.innerHTML = "stop pins: " + (nl.failsafe.stop_pins.join(" · ") || "—") + " ";
    const b = document.createElement("button");
    b.className = "mini"; b.textContent = "+ stop pin";
    b.addEventListener("click", () => {
      hint("pick a stop pin (e.g. the ESC signal inputs)");
      pickHandler = pin => {
        if (!nl.failsafe.stop_pins.includes(pin)) nl.failsafe.stop_pins.push(pin);
      };
    });
    el.appendChild(b);
    const clr = document.createElement("button");
    clr.className = "mini"; clr.textContent = "clear";
    clr.addEventListener("click", () => { nl.failsafe.stop_pins = []; refresh(); });
    el.appendChild(clr);
  }

  let checkTimer = null;
  function runChecksSoon() {
    clearTimeout(checkTimer);
    checkTimer = setTimeout(() => {
      updateProse();
      const res = callChecks(nl);
      const verdict = document.getElementById("verdict");
      const el = document.getElementById("checks");
      if (res.error) {
        verdict.className = "bad";
        verdict.textContent = "SCHEMA: " + res.error;
        el.innerHTML = "";
        return;
      }
      const fails = res.checks.filter(c => !c.pass);
      verdict.className = fails.length ? "bad" : "ok";
      verdict.textContent = fails.length
        ? `E-CHECK FAILURES (${fails.length}) — do not solder`
        : "HARNESS LEGAL — all checks pass";
      el.innerHTML = res.checks.map(c => {
        const col = c.pass ? "var(--ok)" : "var(--bad)";
        return `<div class="check"><span class="pill" style="background:${col}">${c.pass ? "PASS" : "FAIL"}</span>` +
          `<span>${c.code}</span><span class="d">${c.detail}</span></div>`;
      }).join("");
    }, 250);
  }

  function refresh() {
    nameEl.value = nl.name;
    renderLayers();
    renderExamples();
    renderPalette();
    renderNets();
    renderBuses();
    renderFailsafe();
    renderSelInfo();
    draw();
    runChecksSoon();
  }

// designer/10-io.js — import/export dialog elements
  const dlg = document.getElementById("ioDialog");
  const nameEl = document.getElementById("nlname");
  nameEl.addEventListener("change", () => { nl.name = nameEl.value; refresh(); });


// designer/11-boot.js — event wiring + startup — original execution order preserved
  // The height a fresh wire-bend drag should slide across: the bend's own
  // stored height if it has one, else the same default altitude the
  // no-bend 3D arc would use — so grabbing an unbent wire doesn't make it
  // jump before you've even moved the pointer.
  function startWireDragZ(net, wi) {
    const bend = wireBendOf(net.id);
    if (bend && bend[2] != null) return bend[2];
    const ends = net.pins.map(pin3).filter(Boolean);
    return ends.length === 2 ? defaultWireLift3(net, wi, ends) : 40;
  }
  cv.addEventListener("pointerdown", e => {
    const mx = e.offsetX, my = e.offsetY;
    if (runMode) {
      if (handleRunPointerDown(mx, my)) { cv.setPointerCapture(e.pointerId); return; }
      // Not a switch/button: bending a wire's path is a layout change, not a
      // netlist edit, so it's allowed even while the simulation is running.
      const wi = wireAt(mx, my);
      if (wi >= 0) {
        dragWireNet = wi; dragWireMoved = false;
        if (mode === "3d") dragWireZ = startWireDragZ(nl.nets[wi], wi);
        cv.setPointerCapture(e.pointerId);
      }
      return;
    }
    const pin = pinAt(mx, my);
    if (pin) {
      if (pickHandler) { const h = pickHandler; pickHandler = null; h(pin); refresh(); return; }
      // Press starts a potential drag-wire; release decides (drag onto a
      // pin to connect, or a plain click for the click-click flow).
      wireDrag = { from: pin, cur: [mx, my], moved: false };
      cv.setPointerCapture(e.pointerId);
      draw();
      return;
    }
    // removal badge on the selected box? (2D only; Delete works everywhere)
    if (mode === "2d" && selInst && layout[selInst]) {
      const g = boxGeo(selInst);
      if (Math.hypot(mx - (g.x + g.w / 2 - 2), my - (g.y - g.h / 2 + 2)) < 10) {
        removeInstance(selInst);
        refresh(); return;
      }
    }
    const wi = wireAt(mx, my);
    if (wi >= 0) {
      selNet = wi; selInst = null;
      // Press starts a potential wire-bend drag; a plain click (no move by
      // pointerup) leaves the existing select behaviour untouched.
      dragWireNet = wi; dragWireMoved = false;
      if (mode === "3d") dragWireZ = startWireDragZ(nl.nets[wi], wi);
      cv.setPointerCapture(e.pointerId);
      renderNets(); renderSelInfo(); draw();
      const row = document.querySelectorAll("#nets .row")[wi];
      if (row) row.scrollIntoView({ block: "nearest" });
      return;
    }
    const inst = instAt(mx, my);
    if (inst) {
      selInst = inst; selNet = -1;
      if (mode === "2d") {
        dragInst = inst; dragMoved = false;
        dragOff = [mx - layout[inst][0], my - layout[inst][1]];
        cv.setPointerCapture(e.pointerId);
      }
      renderNets(); renderSelInfo(); draw();
      return;
    }
    if (mode === "3d") {
      orbiting = true;
      lastXY = [mx, my];
      cv.classList.add("dragging");
      cv.setPointerCapture(e.pointerId);
      return;
    }
    pending = null; selInst = null; selNet = -1;
    renderNets(); renderSelInfo(); draw();
  });
  cv.addEventListener("pointermove", e => {
    if (dragWireNet != null) {
      dragWireMoved = true;
      const netId = nl.nets[dragWireNet].id;
      if (mode === "3d") {
        const pt = unproject3(e.offsetX, e.offsetY, dragWireZ);
        if (pt) setWireBend3D(netId, pt[0], pt[1], pt[2]);
      } else {
        setWireBend2D(netId, e.offsetX, e.offsetY);
      }
      draw();
      return;
    }
    if (wireDrag) {
      wireDrag.cur = [e.offsetX, e.offsetY];
      if (!wireDrag.moved) {
        const sp = mode === "3d" ? (pin3(wireDrag.from) && project3(pin3(wireDrag.from))) : pinXY(wireDrag.from);
        if (sp && Math.hypot(e.offsetX - sp[0], e.offsetY - sp[1]) > 7) wireDrag.moved = true;
      }
      draw();
      return;
    }
    if (orbiting) {
      yaw += (e.offsetX - lastXY[0]) * 0.008;
      pitch = Math.max(0.05, Math.min(1.45, pitch + (e.offsetY - lastXY[1]) * 0.006));
      lastXY = [e.offsetX, e.offsetY];
      draw();
      return;
    }
    if (dragInst) {
      dragMoved = true;
      layout[dragInst] = [e.offsetX - dragOff[0], e.offsetY - dragOff[1]];
      draw();
      return;
    }
    // cursor feedback + pin hover explanation
    const mx = e.offsetX, my = e.offsetY;
    const hoverPin = pinAt(mx, my);
    cv.style.cursor = hoverPin ? "crosshair"
      : wireAt(mx, my) >= 0 ? "pointer"
      : instAt(mx, my) ? "move" : "default";
    if (hoverPin) {
      const nets = nl.nets.filter(n => n.pins.includes(hoverPin)).map(n => n.id);
      for (const bus of nl.buses) {
        if (bus.sda === hoverPin || bus.scl === hoverPin) nets.push(bus.id);
        for (const d of bus.devices) if (d.xshut === hoverPin) nets.push("XSHUT " + d.inst);
      }
      hint(`${hoverPin} — ${pinProse(hoverPin) || "?"}${nets.length ? " · on " + nets.join(", ") : " · unwired"}`);
    }
  });
  cv.addEventListener("pointerup", e => {
    // Checked before the runMode early-return below: bending a wire's path
    // is a layout change, not a netlist edit, so it works while running too.
    if (dragWireNet != null) {
      if (dragWireMoved) saveLayout();
      dragWireNet = null;
      draw();
      return;
    }
    if (runMode) return; // release is handled globally (see 12-run.js) — a
    // hold started from the side panel may release off-canvas.
    if (wireDrag) {
      const target = pinAt(e.offsetX, e.offsetY);
      if (wireDrag.moved && target && target !== wireDrag.from) {
        createNet(wireDrag.from, target);
        pending = null; wireDrag = null;
        refresh(); return;
      }
      if (!wireDrag.moved) {
        const pin = wireDrag.from;
        if (!pending) pending = pin;
        else if (pending !== pin) { createNet(pending, pin); pending = null; wireDrag = null; refresh(); return; }
        else pending = null;
      }
      wireDrag = null;
      draw(); return;
    }
    if (dragInst) { dragInst = null; saveLayout(); }
    if (orbiting) { orbiting = false; cv.classList.remove("dragging"); }
  });
  cv.addEventListener("dblclick", e => {
    const wi = wireAt(e.offsetX, e.offsetY);
    if (wi >= 0) { clearWireBend(nl.nets[wi].id); saveLayout(); draw(); }
  });
  cv.addEventListener("wheel", e => {
    if (mode !== "3d") return;
    e.preventDefault();
    dist = Math.max(250, Math.min(2600, dist * (1 + e.deltaY * 0.001)));
    draw();
  }, { passive: false });
  document.getElementById("arrangeBtn").addEventListener("click", autoArrange);
  document.getElementById("modeBtn").addEventListener("click", () => {
    mode = mode === "2d" ? "3d" : "2d";
    document.getElementById("modeBtn").textContent = mode === "2d" ? "3D view" : "2D view";
    pending = null;
    draw();
  });
  cv.addEventListener("dragover", e => {
    if (e.dataTransfer.types.includes("text/robowire-part")) {
      e.preventDefault();
      e.dataTransfer.dropEffect = "copy";
    }
  });
  cv.addEventListener("drop", e => {
    if (runMode) return;
    const partId = e.dataTransfer.getData("text/robowire-part");
    if (!partId) return;
    e.preventDefault();
    placeInstance(partId, e.offsetX, e.offsetY);
    refresh();
  });
  window.addEventListener("keydown", e => {
    const tag = document.activeElement && document.activeElement.tagName;
    if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
    if (runMode) { if (e.key === "Escape") exitRunMode(); return; }
    if (e.key === "Escape") { pending = null; pickHandler = null; wireDrag = null; selInst = null; selNet = -1; renderNets(); renderSelInfo(); draw(); hint(""); }
    if ((e.key === "r" || e.key === "R") && selInst && mode === "2d") {
      const L = layout[selInst];
      L[2] = ((L[2] || 0) + 90) % 360;
      saveLayout();
      draw();
      return;
    }
    if ((e.key === "Delete" || e.key === "Backspace")) {
      if (selNet >= 0) { clearWireBend(nl.nets[selNet].id); nl.nets.splice(selNet, 1); selNet = -1; refresh(); }
      else if (selInst) { removeInstance(selInst); refresh(); }
      e.preventDefault();
    }
  });
  document.getElementById("partFilter").addEventListener("input", renderPalette);

  document.getElementById("exportBtn").addEventListener("click", () => {
    document.getElementById("ioTitle").textContent = "netlist json — canonical (layout not included)";
    document.getElementById("ioText").value = JSON.stringify(nl, null, 2);
    document.getElementById("ioApply").style.display = "none";
    dlg.showModal();
  });
  document.getElementById("importBtn").addEventListener("click", () => {
    document.getElementById("ioTitle").textContent = "paste netlist json";
    document.getElementById("ioText").value = "";
    document.getElementById("ioApply").style.display = "";
    dlg.showModal();
  });
  document.getElementById("ioApply").addEventListener("click", () => {
    if (runMode) exitRunMode();
    try {
      nl = JSON.parse(document.getElementById("ioText").value);
      if (!nl.failsafe) nl.failsafe = { rx_loss: "", stop_pins: [] };
      if (!nl.buses) nl.buses = [];
      layout = {};
      try { layout = JSON.parse(localStorage.getItem(LAYOUT_KEY()) || "{}"); } catch {}
      dlg.close(); refresh();
    } catch (e) { alert("parse error: " + e.message); }
  });
  document.getElementById("ioDownload").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(nl, null, 2) + "\n"], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = nl.name + ".json";
    a.click();
  });
  document.getElementById("ioClose").addEventListener("click", () => dlg.close());
  window.addEventListener("resize", resize);
  if (typeof ResizeObserver !== "undefined") {
    new ResizeObserver(() => resize()).observe(cv);
  }
  resize();
  refresh();
  // First-ever load (no saved layout): arrange instead of the overlap
  // cascade, once the grid has settled.
  requestAnimationFrame(() => {
    if (!hadSavedLayout && Object.keys(nl.instances).length) autoArrange();
  });

// designer/12-run.js — interactive run mode (specs/robowire.md §3a): click a
// switch, the LED lights. Event-driven, no firmware, no timeline — every
// part's rendered state is a pure function of the current switch/button/
// throttle/sensor inputs, recomputed via the real wasm run_state engine on
// every change (same code as the CLI/tests, per design-servers discipline).
// State (runMode, runState, runInputs, ...) lives in 01-state.js — see the
// comment there for why.

  // inst -> { row, readout, reason, toggle? } — the run panel's per-instance
  // interactive elements, built once (see renderRunPanel). Only ever read
  // from within run-mode functions (never during the initial synchronous
  // page-load draw()), so no TDZ hazard declaring it here.
  let runRowRefs = {};

  function defaultRunInputs() {
    const inputs = { switches: {}, buttons: {}, throttles: {}, dial_positions: {}, sensor_values: {} };
    for (const [inst, partId] of Object.entries(nl.instances)) {
      const part = partById[partId];
      if (!part) continue;
      if (part.kind === "switch") inputs.switches[inst] = false;
      if (part.kind === "button") inputs.buttons[inst] = false;
      if (part.kind === "motor") inputs.throttles[inst] = 0;
      if (part.kind === "potentiometer") inputs.dial_positions[inst] = 0.5;
      if (part.kind === "tof") inputs.sensor_values[inst] = part.range_mm ?? 0;
      if (part.kind === "imu") inputs.sensor_values[inst] = 0;
    }
    return inputs;
  }

  function updateRunState() {
    if (!runMode) return;
    runState = callRunState(nl, runInputs);
    renderRunPanel();
    draw();
  }

  function toggleSwitch(inst) { runInputs.switches[inst] = !runInputs.switches[inst]; updateRunState(); }
  function setDialPosition(inst, v) { runInputs.dial_positions[inst] = v; updateRunState(); }
  function setButtonHeld(inst, held) { runInputs.buttons[inst] = held; updateRunState(); }
  function setThrottle(inst, v) { runInputs.throttles[inst] = v; updateRunState(); }
  function setSensorValue(inst, v) { runInputs.sensor_values[inst] = v; updateRunState(); }

  // Global release, not just cv's pointerup: a hold started from the side
  // panel (outside the canvas) still needs to let go wherever the pointer
  // comes up.
  window.addEventListener("pointerup", () => {
    if (heldButtonInst) { const inst = heldButtonInst; heldButtonInst = null; setButtonHeld(inst, false); }
  });

  function handleRunPointerDown(mx, my) {
    const inst = instAt(mx, my);
    if (!inst) return false;
    const kind = kindOf(inst);
    if (kind === "switch") { toggleSwitch(inst); return true; }
    if (kind === "button") { heldButtonInst = inst; setButtonHeld(inst, true); return true; }
    return false;
  }

  function ensureSpinLoop() {
    if (spinRAF) return;
    const tick = () => {
      spinRAF = null;
      if (!runMode) return;
      const spinning = Object.values(runState.instances || {}).some(s => Math.abs(s.spin || 0) > 0.001);
      const flowing = Object.values(runState.nets || {}).some(n => n.amps > 0.001);
      spinPhase += 0.12;
      if (spinning || flowing) draw();
      spinRAF = requestAnimationFrame(tick);
    };
    spinRAF = requestAnimationFrame(tick);
  }

  function enterRunMode() {
    runMode = true;
    runInputs = defaultRunInputs();
    const left = document.getElementById("left");
    left.style.pointerEvents = "none";
    left.style.opacity = "0.4";
    document.getElementById("arrangeBtn").disabled = true;
    document.getElementById("importBtn").disabled = true;
    const btn = document.getElementById("runBtn");
    btn.textContent = "exit run mode";
    btn.classList.add("primary");
    document.getElementById("runPanel").style.display = "";
    selInst = null; selNet = -1; pending = null; wireDrag = null;
    updateRunState();
    ensureSpinLoop();
  }
  function exitRunMode() {
    runMode = false;
    heldButtonInst = null;
    const left = document.getElementById("left");
    left.style.pointerEvents = "";
    left.style.opacity = "";
    document.getElementById("arrangeBtn").disabled = false;
    document.getElementById("importBtn").disabled = false;
    const btn = document.getElementById("runBtn");
    btn.textContent = "run mode";
    btn.classList.remove("primary");
    document.getElementById("runPanel").style.display = "none";
    draw();
  }

  // Each instance's row is built ONCE and its <input>/<button> elements are
  // never destroyed afterward — only their surrounding readout text is
  // patched on each tick. Rebuilding the whole panel on every input event
  // (the previous design) ripped the very slider the user was mid-drag on
  // out of the DOM the instant that drag's own `input` event re-rendered
  // it, silently ending the gesture after a pixel of movement.
  function buildRunPanelRow(inst, part) {
    const row = document.createElement("div");
    row.className = "row runrow";
    let body = `<div class="hd"><b>${inst}</b> <span class="k">${part.kind}</span></div>`;
    if (part.kind === "switch" || part.kind === "button") {
      body += `<button class="mini runToggle" data-kind="${part.kind}"></button>`;
    } else if (part.kind === "motor") {
      body += `<input type="range" class="runThrottle" min="-1" max="1" step="0.05" value="${runInputs.throttles[inst] ?? 0}"> <span class="runReadout"></span>`;
    } else if (part.kind === "potentiometer") {
      body += `<input type="range" class="runDial" min="0" max="1" step="0.01" value="${runInputs.dial_positions[inst] ?? 0.5}"> <span class="runReadout"></span>`;
    } else if (part.kind === "tof" || part.kind === "imu") {
      body += `<input type="number" class="runSensor" value="${runInputs.sensor_values[inst] ?? 0}"> <span class="runReadout"></span>`;
    } else {
      body += `<span class="runReadout"></span>`;
    }
    body += `<div class="d runReason" style="margin-top:3px;color:var(--dim)"></div>`;
    row.innerHTML = body;

    const refs = { row, readout: row.querySelector(".runReadout"), reason: row.querySelector(".runReason") };
    const toggle = row.querySelector(".runToggle");
    if (toggle) {
      refs.toggle = toggle;
      if (part.kind === "switch") toggle.addEventListener("click", () => toggleSwitch(inst));
      else toggle.addEventListener("pointerdown", () => { heldButtonInst = inst; setButtonHeld(inst, true); });
    }
    const throttle = row.querySelector(".runThrottle");
    if (throttle) throttle.addEventListener("input", () => setThrottle(inst, parseFloat(throttle.value)));
    const dial = row.querySelector(".runDial");
    if (dial) dial.addEventListener("input", () => setDialPosition(inst, parseFloat(dial.value)));
    const sensor = row.querySelector(".runSensor");
    if (sensor) sensor.addEventListener("change", () => setSensorValue(inst, parseFloat(sensor.value) || 0));
    return refs;
  }

  function renderRunPanel() {
    const el = document.getElementById("runPanel");
    if (!runMode) { el.innerHTML = ""; runRowRefs = {}; return; }

    for (const [inst, partId] of Object.entries(nl.instances)) {
      if (runRowRefs[inst]) continue;
      const part = partById[partId];
      if (!part) continue;
      runRowRefs[inst] = buildRunPanelRow(inst, part);
      el.appendChild(runRowRefs[inst].row);
    }

    for (const [inst, partId] of Object.entries(nl.instances)) {
      const part = partById[partId];
      const refs = runRowRefs[inst];
      if (!part || !refs) continue;
      const s = (runState.instances || {})[inst] || {};
      if (refs.toggle) refs.toggle.textContent = s.closed ? "ON" : "off";
      if (refs.readout) {
        if (part.kind === "motor") {
          refs.readout.textContent = `spin ${(s.spin ?? 0).toFixed(2)}` + (s.current_a != null ? ` · ${s.current_a.toFixed(2)}A` : "");
        } else if (part.kind === "potentiometer") {
          refs.readout.textContent = `${Math.round((runInputs.dial_positions[inst] ?? 0.5) * 100)}%`;
        } else if (part.kind === "tof" || part.kind === "imu") {
          refs.readout.innerHTML = `${s.powered ? "live" : "unpowered"}` +
            (s.bus_conflict ? ` <span style="color:var(--bad);font-weight:700">ADDRESS CONFLICT</span>` : "");
        } else if (s.powered !== undefined) {
          refs.readout.textContent = `${s.powered ? "powered" : "unpowered"}` + (s.current_a != null ? ` · ${s.current_a.toFixed(2)}A` : "");
        }
      }
      if (refs.reason) refs.reason.textContent = s.reason || "";
    }
  }

  // Fallback label anchor for 2-pin nets (netSegments' `hub` is only set for
  // 3+ pin nets) — centroid of the net's pin positions, in whichever view
  // (2D/3D) is active.
  function netLabelPos(net) {
    const pts = net.pins.map(pinXY).filter(Boolean);
    if (!pts.length) return null;
    const x = pts.reduce((s, p) => s + p[0], 0) / pts.length;
    const y = pts.reduce((s, p) => s + p[1], 0) / pts.length;
    return [x, y];
  }

  function ledGlowColor(inst) {
    const partId = nl.instances[inst] || "";
    return partId.includes("green") ? "#57b48f" : partId.includes("red") ? "#e05c50" : "#e8a33d";
  }

  function drawRunOverlay2d(inst, g) {
    const s = (runState.instances || {})[inst];
    if (!s) return;
    const kind = kindOf(inst);
    if (kind === "led") {
      const r = Math.min(g.w, g.h) / 2 + 4;
      if (s.lit) {
        // Brightness tracks live current (20mA ~ a typical indicator LED's
        // rated forward current, used only as a "what counts as fully
        // bright" reference for this glow — not a declared/authoritative
        // figure). Gamma-corrected (^2.2, the standard display gamma): human
        // brightness perception is far more sensitive at low light levels
        // than current itself is linear, so a LINEAR current->alpha mapping
        // still looks "clearly on" well below rated current — a dimmer
        // pushed most of the way down needs to look convincingly dim, not
        // just "a bit less bright". No alpha/blur floor either, so it can
        // fade all the way toward the off-state look.
        const linear = s.current_limited ? Math.min(1, (s.current_a ?? 0) / 0.02) : 1;
        const brightness = s.current_limited ? Math.pow(linear, 2.2) : 1;
        cx.save();
        cx.shadowColor = ledGlowColor(inst);
        cx.shadowBlur = s.current_limited ? 2 + brightness * 26 : 28;
        cx.fillStyle = ledGlowColor(inst);
        cx.globalAlpha = s.current_limited ? 0.04 + brightness * 0.81 : 0.85;
        cx.beginPath(); cx.arc(g.x, g.y, r, 0, Math.PI * 2); cx.fill();
        cx.restore();
      } else {
        // Clearly OFF, not just "no glow drawn" — a dim, outlined bulb in
        // the LED's own color reads unambiguously as "off", where absence
        // of any marking could just as easily read as "not rendered yet".
        cx.save();
        cx.fillStyle = ledGlowColor(inst);
        cx.globalAlpha = 0.1;
        cx.beginPath(); cx.arc(g.x, g.y, r, 0, Math.PI * 2); cx.fill();
        cx.globalAlpha = 1;
        cx.strokeStyle = "#565f66"; cx.lineWidth = 1.5;
        cx.beginPath(); cx.arc(g.x, g.y, r, 0, Math.PI * 2); cx.stroke();
        cx.restore();
      }
    }
    if ((kind === "switch" || kind === "button") && s.closed) {
      cx.save();
      cx.strokeStyle = "#57b48f"; cx.lineWidth = 3;
      roundRect(g.x - g.w / 2, g.y - g.h / 2, g.w, g.h, 6);
      cx.stroke();
      cx.restore();
    }
    if (kind === "motor" && Math.abs(s.spin || 0) > 0.001) {
      cx.save();
      cx.translate(g.x, g.y);
      cx.rotate(spinPhase * Math.sign(s.spin));
      cx.strokeStyle = "#e8a33d"; cx.lineWidth = 2;
      cx.beginPath(); cx.moveTo(0, 0); cx.lineTo(0, -Math.min(g.w, g.h) / 2 - 2); cx.stroke();
      cx.restore();
    }
    if (kind === "motor" && s.current_a != null) {
      cx.fillStyle = "#c7ced2";
      cx.font = "9px ui-monospace, Menlo, monospace";
      cx.fillText(`${s.current_a.toFixed(2)}A`, g.x - g.w / 2 + 8, g.y + g.h / 2 - 6);
    }
    if (kind === "tof" || kind === "imu") {
      cx.save();
      cx.fillStyle = s.powered ? "#57b48f" : "#4a575f";
      cx.beginPath(); cx.arc(g.x + g.w / 2 - 8, g.y + g.h / 2 - 8, 3, 0, Math.PI * 2); cx.fill();
      if (s.value !== undefined) {
        cx.fillStyle = "#c7ced2";
        cx.font = "9px ui-monospace, Menlo, monospace";
        cx.fillText(Number(s.value).toFixed(0), g.x - g.w / 2 + 8, g.y + g.h / 2 - 6);
      }
      if (s.bus_conflict) {
        cx.fillStyle = "#e05c50";
        cx.font = "bold 9px ui-monospace, Menlo, monospace";
        cx.fillText("CONFLICT", g.x - g.w / 2 + 8, g.y + g.h / 2 + 8);
      }
      cx.restore();
    }
  }

  function drawRunOverlay3d(inst, q) {
    const s = (runState.instances || {})[inst];
    if (!s) return;
    const kind = kindOf(inst);
    if (kind === "led") {
      if (s.lit) {
        // Brightness tracks live current (20mA ~ a typical indicator LED's
        // rated forward current, used only as a "what counts as fully
        // bright" reference for this glow — not a declared/authoritative
        // figure). Gamma-corrected (^2.2, the standard display gamma): human
        // brightness perception is far more sensitive at low light levels
        // than current itself is linear, so a LINEAR current->alpha mapping
        // still looks "clearly on" well below rated current — a dimmer
        // pushed most of the way down needs to look convincingly dim, not
        // just "a bit less bright". No alpha/blur floor either, so it can
        // fade all the way toward the off-state look.
        const linear = s.current_limited ? Math.min(1, (s.current_a ?? 0) / 0.02) : 1;
        const brightness = s.current_limited ? Math.pow(linear, 2.2) : 1;
        cx.save();
        cx.shadowColor = ledGlowColor(inst);
        cx.shadowBlur = s.current_limited ? 2 + brightness * 26 : 28;
        cx.fillStyle = ledGlowColor(inst);
        cx.globalAlpha = s.current_limited ? 0.04 + brightness * 0.81 : 0.85;
        cx.beginPath(); cx.arc(q[0], q[1], 8, 0, Math.PI * 2); cx.fill();
        cx.restore();
      } else {
        // Clearly OFF, not just "no glow drawn" — see the 2D overlay for why.
        cx.save();
        cx.fillStyle = ledGlowColor(inst);
        cx.globalAlpha = 0.1;
        cx.beginPath(); cx.arc(q[0], q[1], 8, 0, Math.PI * 2); cx.fill();
        cx.globalAlpha = 1;
        cx.strokeStyle = "#565f66"; cx.lineWidth = 1.5;
        cx.beginPath(); cx.arc(q[0], q[1], 8, 0, Math.PI * 2); cx.stroke();
        cx.restore();
      }
    }
    if ((kind === "switch" || kind === "button") && s.closed) {
      cx.fillStyle = "#57b48f";
      cx.beginPath(); cx.arc(q[0], q[1], 5, 0, Math.PI * 2); cx.fill();
    }
    if (kind === "motor" && Math.abs(s.spin || 0) > 0.001) {
      cx.save();
      cx.translate(q[0], q[1]);
      cx.rotate(spinPhase * Math.sign(s.spin));
      cx.strokeStyle = "#e8a33d"; cx.lineWidth = 2;
      cx.beginPath(); cx.moveTo(0, 0); cx.lineTo(0, -10); cx.stroke();
      cx.restore();
    }
    if (kind === "tof" || kind === "imu") {
      cx.fillStyle = s.bus_conflict ? "#e05c50" : s.powered ? "#57b48f" : "#4a575f";
      cx.beginPath(); cx.arc(q[0] + 10, q[1] - 10, 3, 0, Math.PI * 2); cx.fill();
    }
  }

  document.getElementById("runBtn").addEventListener("click", () => { runMode ? exitRunMode() : enterRunMode(); });

})();
</script>
</body>
</html>
